// Sektion sortieren: alpha nach Name, sonst nach effectiveRating (auf-/absteigend),
// Gleichstand nach Name. effectiveRating = rating ?? 0 -> Unbewertete sind 0.
function sortList(list){
  if(sortMode === "alpha")
    return list.slice().sort((a,b)=>a.name.localeCompare(b.name));
  const dir = sortMode === "low" ? 1 : -1;
  return list.slice().sort((a,b)=>
    dir * (effectiveRating(a) - effectiveRating(b)) || a.name.localeCompare(b.name));
}

// Übersicht aus bereits gefilterter Liste zeichnen
function renderOverview(visible){
  const root = $("overview");
  root.innerHTML = "";
  if(allTextures.length === 0){
    root.innerHTML = '<p class="muted">Noch keine Daten — ZIP laden.</p>'; return;
  }
  if(visible.length === 0){
    root.innerHTML = '<p class="muted">Keine Texturen für die aktuellen Filter.</p>'; return;
  }
  const byCat = {};
  visible.forEach(t=>(byCat[t.category] ||= []).push(t));
  Object.keys(byCat).sort().forEach(cat=>{
    const list = sortList(byCat[cat]);
    const sec = document.createElement("section");
    const h = document.createElement("h2");
    h.textContent = `${cat} (${list.length})`;
    sec.appendChild(h);
    const grid = document.createElement("div");
    grid.className = "grid";
    list.forEach(t=>{
      const tile = document.createElement("div");
      tile.className = "tile";
      const g = groupByMember.get(t.id);
      const nonRep = !!g && g.repId !== t.id;
      if(g) tile.style.borderLeft = "4px solid " + groupColor(g.id);

      const img = document.createElement("img");
      img.src = t.dataUrl; img.alt = t.name; img.loading = "lazy";
      const nm = document.createElement("div");
      nm.className = "name"; nm.title = t.name;
      nm.innerHTML = (g && g.repId === t.id ? '<span class="grep-star">★</span>' : "") + escapeHtml(t.name);
      const rate = document.createElement("div");
      rate.className = "rating" + (t.rating == null ? " unrated" : "");
      rate.textContent = t.rating == null ? "ungewertet" : "★ " + t.rating;
      tile.append(img, nm, rate);
      if(g){
        const lbl = document.createElement("div");
        lbl.className = "glabel"; lbl.textContent = g.name; lbl.title = g.name;
        tile.appendChild(lbl);
      }

      if(t.isDefault){
        addBadge(tile, "default", "STANDARD");
        tile.classList.add("std");
        grid.appendChild(tile);
        return;
      }
      // Diff-Badge (neu/geändert/entfernt)
      if(t.flag === "new" || t.flag === "changed" || t.flag === "removed"){
        addBadge(tile, t.flag, t.flag === "new" ? "NEU" : t.flag === "changed" ? "GEÄNDERT" : "ENTFERNT");
        if(t.flag === "removed") tile.classList.add("removed");
      }
      if(isExcluded(t)){ addBadge(tile, "excluded", "AUSGESCHLOSSEN"); tile.classList.add("removed"); }
      else if(nonRep){ addBadge(tile, "group", "GRUPPE"); tile.classList.add("grouped-nonrep"); }

      if(groupMode){
        // Auswahl statt inline bewerten
        if(selectedTiles.has(t.id)) tile.classList.add("sel");
        tile.addEventListener("click", ()=>{
          if(selectedTiles.has(t.id)) selectedTiles.delete(t.id); else selectedTiles.add(t.id);
          tile.classList.toggle("sel");
          renderGroupBar();
        });
      }else{
        // Schalter aus-/einschließen — nur Rep oder ungruppiert; Nicht-Rep bietet
        // keine eigene exclude-Aktion (Gruppen-Status entscheidet der Rep).
        if(!nonRep){
          const ex = document.createElement("span");
          ex.className = "exbtn" + (isExcluded(t) ? " on" : "");
          ex.textContent = "⊘"; ex.title = "Nicht bewerten";
          ex.addEventListener("click", e=>{ e.stopPropagation(); toggleExclude(t); });
          tile.appendChild(ex);
        }
        // inline bewerten nur für bewertbare (nicht ausgeschlossen, kein Nicht-Rep)
        if(!isExcluded(t) && !nonRep)
          tile.addEventListener("click", ()=>openInlineEdit(tile, t));
      }
      grid.appendChild(tile);
    });
    sec.appendChild(grid);
    root.appendChild(sec);
  });
}

// Kachel in-place aktualisieren: das offene Eingabefeld zurück in den Rating-Text wandeln,
// unrated-Klasse passend setzen. Spiegelt exakt das Rating-Markup aus renderOverview.
function refreshTileRating(tile, t){
  const inp = tile.querySelector("input.rate-edit");
  if(!inp) return;
  const rate = document.createElement("div");
  rate.className = "rating" + (t.rating == null ? " unrated" : "");
  rate.textContent = t.rating == null ? "ungewertet" : "★ " + t.rating;
  inp.replaceWith(rate);
}

// Inline-Eingabe 1–100 in einer Kachel; sofort speichern
function openInlineEdit(tile, t){
  if(tile.querySelector("input")) return;        // schon offen
  const rate = tile.querySelector(".rating");
  const inp = document.createElement("input");
  inp.type = "text"; inp.inputMode = "numeric"; inp.maxLength = 3; inp.className = "rate-edit";
  inp.value = t.rating == null ? "" : t.rating;
  rate.replaceWith(inp);
  inp.focus(); inp.select();
  let done = false;
  const commit = async save=>{
    if(done) return; done = true;
    if(save){
      const raw = inp.value.trim();
      let val = t.rating;                                // unverändert, falls ungültig
      if(raw === ""){ val = null; }                      // leer -> wieder ungewertet
      else { const n = Math.min(100, Math.max(1, Math.round(Number(raw))));
             if(Number.isFinite(n)) val = n; }
      await applyRating(t, val);                          // Event + sofort persistieren
    }
    // Kein voller Rebuild: nur die Kachel in-place + die billigen Kopf-Widgets. Bei sortMode
    // low/high kann sich die Position ändern — die Kachel bleibt bis zum nächsten vollen
    // Rebuild an Ort.
    refreshTileRating(tile, t);
    renderHero(); renderLadder(); renderRateBadge();
  };
  inp.addEventListener("input", ()=>{ inp.value = inp.value.replace(/[^0-9]/g, ""); });
  inp.addEventListener("keydown", e=>{
    e.stopPropagation();
    if(e.key === "Enter") commit(true);
    else if(e.key === "Escape") commit(false);
  });
  inp.addEventListener("blur", ()=>commit(true));
}

// Badge in Container oben rechts stapeln
function badgesEl(tile){
  let c = tile.querySelector(".badges");
  if(!c){ c = document.createElement("div"); c.className = "badges"; tile.appendChild(c); }
  return c;
}
function addBadge(tile, cls, text){
  const b = document.createElement("span");
  b.className = "badge " + cls; b.textContent = text;
  badgesEl(tile).appendChild(b);
}

// Floating-Leiste im Gruppen-Modus
function renderGroupBar(){
  const bar = $("groupbar");
  if(!groupMode){ bar.hidden = true; return; }
  bar.hidden = false; bar.innerHTML = "";
  const info = document.createElement("span");
  info.textContent = selectedTiles.size + " ausgewählt";
  const neu = document.createElement("button"); neu.textContent = "Neue Gruppe";
  neu.addEventListener("click", onNewGroup);
  const add = document.createElement("button"); add.textContent = "Zu Gruppe hinzufügen";
  add.addEventListener("click", onAddToGroup);
  const cancel = document.createElement("button"); cancel.textContent = "Abbrechen";
  cancel.addEventListener("click", ()=>{ selectedTiles.clear(); groupMode = false; renderFilters(); renderAll(); });
  bar.append(info, neu, add, cancel);
}
async function onNewGroup(){
  if(selectedTiles.size < 2){ alert("Mindestens 2 Texturen auswählen."); return; }
  const name = prompt("Gruppenname:", "Neue Gruppe");
  if(name === null) return;
  const ids = [...selectedTiles];
  groups.push({ id: genId(), name: name.trim() || "Gruppe", repId: ids[0], memberIds: ids });
  selectedTiles.clear(); groupMode = false;
  await persistGroups(); renderFilters(); renderAll();
}
async function onAddToGroup(){
  if(selectedTiles.size === 0){ alert("Nichts ausgewählt."); return; }
  if(groups.length === 0){ alert("Keine Gruppe vorhanden."); return; }
  const list = groups.map((g,i)=>`${i+1}: ${g.name}`).join("\n");
  const pick = prompt("Zu welcher Gruppe? Nummer eingeben:\n" + list);
  if(pick === null) return;
  const g = groups[Number(pick) - 1];
  if(!g){ alert("Ungültige Nummer."); return; }
  selectedTiles.forEach(id=>{ if(!g.memberIds.includes(id)) g.memberIds.push(id); });
  selectedTiles.clear(); groupMode = false;
  await persistGroups(); renderFilters(); renderAll();
}

// Gruppen-Panel: umbenennen, Rep wechseln, Mitglied entfernen, auflösen
function renderGroupPanel(){
  const p = $("grouppanel");
  if(!groupPanelOpen){ p.hidden = true; return; }
  p.hidden = false; p.innerHTML = "";
  const h = document.createElement("h2");
  h.textContent = `Gruppen (${groups.length})`;
  p.appendChild(h);
  if(groups.length === 0){
    const e = document.createElement("p"); e.className = "muted"; e.textContent = "Keine Gruppen.";
    p.appendChild(e); return;
  }
  groups.forEach(g=>{
    const card = document.createElement("div");
    card.className = "gcard";
    card.style.borderLeft = "4px solid " + groupColor(g.id);
    const head = document.createElement("div"); head.className = "ghead";
    const nameInp = document.createElement("input");
    nameInp.className = "gname"; nameInp.value = g.name;
    nameInp.addEventListener("change", async ()=>{
      g.name = nameInp.value.trim() || g.name;
      await persistGroups(); renderAll();
    });
    const dissolve = document.createElement("button");
    dissolve.className = "danger"; dissolve.textContent = "Auflösen";
    dissolve.addEventListener("click", async ()=>{
      groups = groups.filter(x=>x.id !== g.id);
      await persistGroups(); renderAll();
    });
    head.append(nameInp, dissolve);
    const mwrap = document.createElement("div"); mwrap.className = "gmembers";
    g.memberIds.forEach(id=>{
      const t = texById.get(id); if(!t) return;
      const thumb = document.createElement("div");
      thumb.className = "gthumb" + (g.repId === id ? " rep" : "");
      const im = document.createElement("img"); im.src = t.dataUrl; im.title = t.name;
      thumb.appendChild(im);
      if(g.repId === id){
        const st = document.createElement("span"); st.className = "gstar"; st.textContent = "★";
        thumb.appendChild(st);
      }
      const x = document.createElement("span"); x.className = "gx"; x.textContent = "×";
      x.title = "Mitglied entfernen";
      x.addEventListener("click", async e=>{
        e.stopPropagation();
        g.memberIds = g.memberIds.filter(m=>m !== id);
        await persistGroups(); renderAll();
      });
      thumb.appendChild(x);
      thumb.addEventListener("click", async ()=>{   // Mitglied = neuer Repräsentant
        g.repId = id; await persistGroups(); renderAll();
      });
      mwrap.appendChild(thumb);
    });
    card.append(head, mwrap);
    p.appendChild(card);
  });
}

// Kennzahlen-Hero: Ø gesamt groß (Teal + Glow) + vier Sekundärkennzahlen.
// Basis = Population (dashPopulation), gleiche Berechnungen wie Dashboard.
function renderHero(){
  const box = $("hero");
  if(allTextures.length === 0){
    box.className = "empty";
    box.innerHTML = "Noch keine Daten — ZIP über das Fenster ziehen oder oben „ZIP laden“.";
    return;
  }
  box.className = "";
  const pop = dashPopulation();
  const rated  = pop.filter(t=> t.rating != null);
  const decent = pop.filter(t=> effectiveRating(t) >= 50);
  const avg = a=> a.length ? (a.reduce((s,t)=>s+t.rating, 0) / a.length).toFixed(1) : "–";
  const ratedPct  = pop.length ? Math.round(rated.length  / pop.length * 100) : 0;
  const decentPct = pop.length ? Math.round(decent.length / pop.length * 100) : 0;
  // Schnitte der aktiven Kategorien (selectedCats) als Werteliste
  const byCat = {};
  pop.forEach(t=>{ if(selectedCats.has(t.category)) (byCat[t.category] ||= []).push(t); });
  const catRows = Object.keys(byCat).sort().map(c=>{
    const r = byCat[c].filter(t=>t.rating != null);
    return `<div class="hero-cat"><span class="k">${c}</span><span class="v">${avg(r)}</span></div>`;
  }).join("") || `<div class="hero-cat"><span class="k">keine aktiven Kategorien</span></div>`;
  box.innerHTML = `
    <div class="hero-avg">
      <div class="lab">Durchschnitt gesamt</div>
      <div class="val">${avg(rated)}</div>
    </div>
    <div class="hero-divider"></div>
    <div class="hero-sec">
      <div class="hero-metric">
        <div class="lab">Bewertet</div>
        <div class="num">${rated.length} <small>/ ${pop.length}</small></div>
        <div class="hero-bar blue"><div style="width:${ratedPct}%"></div></div>
      </div>
      <div class="hero-metric">
        <div class="lab">Durchgespielt (50+)</div>
        <div class="num">${decent.length} <small>/ ${pop.length}</small></div>
        <div class="hero-bar teal"><div style="width:${decentPct}%"></div></div>
      </div>
      <div class="hero-cats">${catRows}</div>
    </div>`;
}

// Filterleiste in vier Cluster: Status · Selektoren · Sichtbarkeit · Gruppen, Suche rechts.
function renderFilters(){
  const bar = $("filterbar");
  bar.innerHTML = "";
  $("categories").hidden = !foldersOpen;
  if(allTextures.length === 0) return;
  const cluster = (...els)=>{ const d = document.createElement("div"); d.className = "fcluster"; d.append(...els); return d; };
  const divider = ()=>{ const d = document.createElement("div"); d.className = "fdiv"; return d; };

  /* --- Cluster 1: Status (genau einer aktiv) --- */
  const seg = document.createElement("div"); seg.className = "seg";
  [["all","Alle"],["rated","Bewertet"],["unrated","Unbewertet"],
   ["new","Neu"],["changed","Geändert"]].forEach(([v,lbl])=>{
    const b = document.createElement("button");
    b.className = "segbtn" + (statusFilter === v ? " active" : "");
    b.textContent = lbl;
    b.addEventListener("click", ()=>{ statusFilter = v; binFilter = null; renderFilters(); renderAll(); });
    seg.appendChild(b);
  });

  /* --- Cluster 2: Selektoren (Erfasste Ordner, Sortierung, Kategorien) --- */
  const foldersBtn = document.createElement("button");
  foldersBtn.textContent = "Erfasste Ordner";
  if(foldersOpen) foldersBtn.classList.add("active");
  foldersBtn.addEventListener("click", async ()=>{
    foldersOpen = !foldersOpen;
    await putOne("settings", {key:"foldersOpen", value:foldersOpen});
    renderFilters();
  });
  const sortSel = document.createElement("select");
  sortSel.id = "sortmode";
  [["low","niedrigste zuerst"],["high","höchste zuerst"],["alpha","alphabetisch"]]
    .forEach(([v,lbl])=> sortSel.add(new Option(lbl, v)));
  sortSel.value = sortMode;
  sortSel.addEventListener("change", async ()=>{
    sortMode = sortSel.value;
    await putOne("settings", {key:"sortMode", value:sortMode});
    binFilter = null; renderAll();
  });
  const catSel = document.createElement("select");
  catSel.id = "catfilter";
  catSel.add(new Option("Alle Kategorien", "all"));
  [...selectedCats].sort().forEach(c=>catSel.add(new Option(c, c)));
  catFilter = [...catSel.options].some(o=>o.value === catFilter) ? catFilter : "all";
  catSel.value = catFilter;
  catSel.addEventListener("change", ()=>{ catFilter = catSel.value; binFilter = null; renderAll(); });

  /* --- Cluster 3: Sichtbarkeit (Standard-Texturen anzeigen) --- */
  const stdLabel = document.createElement("label"); stdLabel.className = "fcheck";
  const stdCb = document.createElement("input");
  stdCb.type = "checkbox"; stdCb.checked = !hideDefault;       // Haken an = Defaults sichtbar
  stdCb.addEventListener("change", async ()=>{
    hideDefault = !stdCb.checked;
    await putOne("settings", {key:"hideDefault", value:hideDefault});
    binFilter = null; renderAll();
  });
  stdLabel.append(stdCb, " Standard-Texturen anzeigen");

  /* --- Cluster 4: Gruppen (Split-Control + Gruppieren) --- */
  const split = document.createElement("div"); split.className = "split";
  const openBtn = document.createElement("button"); openBtn.id = "grp-open-btn"; openBtn.textContent = "Gruppen";
  openBtn.addEventListener("click", ()=>{ groupPanelOpen = !groupPanelOpen; renderGroupPanel(); });
  const gmenu = document.createElement("details"); gmenu.className = "menu";
  const gsum = document.createElement("summary"); gsum.textContent = "▾";
  const gpop = document.createElement("div"); gpop.className = "menu-pop grp-pop";

  const repLabel = document.createElement("label"); repLabel.className = "menu-item";
  const repCb = document.createElement("input"); repCb.type = "checkbox"; repCb.checked = onlyReps;
  repCb.addEventListener("change", ()=>{ onlyReps = repCb.checked; renderAll(); });
  repLabel.append(repCb, " Nur Repräsentanten anzeigen");

  const sugBtn = document.createElement("button"); sugBtn.className = "menu-item";
  sugBtn.textContent = "Vorschläge ergänzen";
  sugBtn.addEventListener("click", ()=>{ gmenu.open = false; suggestGroups(); });

  const sep = document.createElement("div"); sep.className = "menu-sep";

  const clearBtn = document.createElement("button"); clearBtn.className = "menu-item";
  clearBtn.textContent = "Markierungen zurücksetzen";
  clearBtn.addEventListener("click", ()=>{ gmenu.open = false; clearFlags(); });

  gpop.append(repLabel, sugBtn, sep, clearBtn);
  gmenu.append(gsum, gpop);
  split.append(openBtn, gmenu);

  const groupBtn = document.createElement("button");
  groupBtn.textContent = groupMode ? "Gruppieren: AN" : "Gruppieren";
  if(groupMode) groupBtn.classList.add("active");
  groupBtn.addEventListener("click", ()=>{ groupMode = !groupMode; selectedTiles.clear(); renderFilters(); renderAll(); });

  /* --- Suche, rechtsbündig zur Verteilungs-Kante --- */
  const search = document.createElement("input");
  search.type = "search"; search.id = "tsearch"; search.placeholder = "Suchen …";
  search.value = searchText;
  search.addEventListener("input", ()=>{ searchText = search.value.trim().toLowerCase(); renderAll(); });
  const searchWrap = document.createElement("div"); searchWrap.className = "fcluster fsearch";
  searchWrap.appendChild(search);

  bar.append(
    cluster(seg), divider(),
    cluster(foldersBtn, sortSel, catSel), divider(),
    cluster(stdLabel), divider(),
    cluster(split, groupBtn),
    searchWrap
  );
}

// sichtbare Menge berechnen, Stats + Übersicht zeichnen
function matchStatus(t){
  switch(statusFilter){
    case "rated":   return t.rating != null;
    case "unrated": return t.rating == null;
    case "new":     return t.flag === "new";
    case "changed": return t.flag === "changed";
    default:        return true;            // "all"
  }
}
// Struktur-Filter (Kategorie, Standard, Repräsentanten) ohne Status/Bin.
// Gemeinsame Basis für Übersicht UND Tier-Leiter.
function structuralMatch(t){
  return selectedCats.has(t.category) &&
    (catFilter === "all" || t.category === catFilter) &&
    (!hideDefault || !t.isDefault) &&
    (!onlyReps || !isGroupedNonRep(t));
}
// Bereichsfilter aus der Tier-Leiter: nur Ratings im Bereich.
function binMatch(t){
  if(!binFilter) return true;
  return t.rating != null && t.rating >= binFilter.min && t.rating <= binFilter.max;
}
// Namensfilter aus der Suche (Teilstring, case-insensitive). Leer = kein Filter.
function searchMatch(t){
  return searchText === "" || t.name.toLowerCase().includes(searchText);
}
function renderAll(){
  const visible = allTextures.filter(t=>
    structuralMatch(t) && matchStatus(t) && binMatch(t) && searchMatch(t)
  );
  renderHero();
  renderLadder();
  renderOverview(visible);
  renderGroupBar();
  renderGroupPanel();
  renderRateBadge();
  renderDiffAction();
  if(!$("view-dashboard").hidden) renderDashboard();
}

// Tier-Leiter: feste Stufen, oben nach unten. Trennlinie nach 50–59 (Zielmarke).
const LADDER_TIERS = [
  {label:"90+",   min:90, max:100, color:"#0F6E56"},
  {label:"80–89", min:80, max:89,  color:"#1D9E75"},
  {label:"70–79", min:70, max:79,  color:"#5DCAA5"},
  {label:"60–69", min:60, max:69,  color:"#5DCAA5"},
  {label:"50–59", min:50, max:59,  color:"#9FE1CB"},
  {label:"40–49", min:40, max:49,  color:"#EF9F27"},
  {label:"30–39", min:30, max:39,  color:"#EF9F27"},
  {label:"20–29", min:20, max:29,  color:"#E24B4A"},
  {label:"<20",   min:0,  max:19,  color:"#E24B4A"},
];
const LADDER_DIVIDER_AFTER = 4;               // Trennlinie nach 50–59

// Population exakt wie die Durchschnitte: nur Repräsentanten, kein Default,
// kein rateOverride "exclude", nur tatsächlich bewertet. Status-Filter zählt mit,
// eigener Bereichsfilter (binFilter) NICHT -> Leiter zeigt immer alle Stufen.
function ladderBase(){
  return allTextures.filter(t=>
    structuralMatch(t) && matchStatus(t) && effectiveRatable(t) && t.rating != null
  );
}
function tierActive(tier){
  return binFilter && binFilter.min === tier.min && binFilter.max === tier.max;
}
// Tier-Leiter nur in der Bewerten-Übersicht (#tierladder). Klick filtert binFilter.
function renderLadder(){
  const box = $("tierladder");
  if(allTextures.length === 0){ box.innerHTML = ""; return; }
  const data = ladderBase();
  const counts = LADDER_TIERS.map(tier=>
    data.filter(t=> t.rating >= tier.min && t.rating <= tier.max).length
  );
  const max = Math.max(1, ...counts);
  box.innerHTML = "";

  const head = document.createElement("div");
  head.className = "tl-head";
  const title = document.createElement("span");
  title.innerHTML = `Rating-Verteilung <span class="muted">(${data.length} bewertet)</span>`;
  head.appendChild(title);
  if(binFilter){
    const active = LADDER_TIERS.find(tierActive);
    const reset = document.createElement("button");
    reset.className = "tl-reset";
    reset.textContent = `Filter ${active ? active.label : binFilter.min+"–"+binFilter.max} zurücksetzen`;
    reset.addEventListener("click", ()=>{ binFilter = null; renderAll(); });
    head.appendChild(reset);
  }
  box.appendChild(head);

  // schwebende Box an der Maus

/* ---------- Web Audio (synthetisch) ---------- */
// AudioContext bei erster Geste erzeugen; bei suspended resumen. Blockiert -> lautlos.
function ensureAudio(){
  try{
    if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if(audioCtx.state === "suspended") audioCtx.resume();
  }catch{ audioCtx = null; }
  return audioCtx;
}
// MARKER Sound-Hook: später echte Dateien hier einhängen, z.B.
//   function playSample(name){ new Audio(`sfx/${name}.mp3`).play(); }
// und soundLevelUp/soundRankUp auf playSample(...) umstellen — gleiche Aufrufstelle.
function synthTone(freq, start, dur, type, gain){
  const ac = audioCtx; if(!ac) return;
  const o = ac.createOscillator(), g = ac.createGain();
  o.type = type || "triangle"; o.frequency.value = freq;
  o.connect(g); g.connect(ac.destination);
  const t = ac.currentTime + start;
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(gain || 0.16, t + 0.02);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  o.start(t); o.stop(t + dur + 0.03);
}
function soundLevelUp(){
  if(!ensureAudio()) return;
  [660, 990, 1320].forEach((f,i)=> synthTone(f, i*0.06, 0.18, "triangle", 0.15));
}
function soundRankUp(){
  if(!ensureAudio()) return;
  [523, 659, 784].forEach(f=> synthTone(f, 0, 0.5, "triangle", 0.17));
  synthTone(1046, 0.08, 0.4, "triangle", 0.11);
  synthTone(1568, 0.16, 0.4, "triangle", 0.09);
}
// Laufender Swoosh während die XP-Leiste steigt: tiefpassgefiltertes Rauschen,
// Filterfrequenz + Lautstärke folgen der Füllgeschwindigkeit (update(speed), 0..1).
// up=false -> gedämpfter, tieferer Swoosh ohne Jubeltöne. Audio blockiert -> null.
function startSwoosh(up){
  const ac = ensureAudio(); if(!ac) return null;
  const buf = ac.createBuffer(1, ac.sampleRate * 1.5, ac.sampleRate);
  const data = buf.getChannelData(0);
  for(let i=0;i<data.length;i++) data[i] = Math.random()*2 - 1;
  const src = ac.createBufferSource(); src.buffer = buf; src.loop = true;
  const filter = ac.createBiquadFilter();
  filter.type = "lowpass"; filter.frequency.value = up ? 1000 : 450;
  const g = ac.createGain(); g.gain.value = 0.0001;
  src.connect(filter); filter.connect(g); g.connect(ac.destination);
  try{ src.start(); }catch{ return null; }
  const fMin = up ? 240 : 150, fMax = up ? 2200 : 900, gMax = up ? 0.06 : 0.035;
  return {
    update(speed){
      const s = Math.max(0, Math.min(1, speed));
      const t = ac.currentTime;
      filter.frequency.setTargetAtTime(fMin + (fMax - fMin) * s, t, 0.03);
      g.gain.setTargetAtTime(Math.max(0.0001, gMax * s), t, 0.03);
    },
    stop(){
      const t = ac.currentTime;
      g.gain.setTargetAtTime(0.0001, t, 0.08);
      try{ src.stop(t + 0.35); }catch{}
    }
  };
}

/* ---------- XP-Animation (CS-Stil) ---------- */
const easeOutExpo = p => p >= 1 ? 1 : 1 - Math.pow(2, -10*p);   // schnell raus, kriecht ins Ziel
function tween(dur, ease, step){
  return new Promise(res=>{
    if(dur <= 0){ step(1); res(); return; }
    const t0 = performance.now();
    (function frame(now){
      const p = Math.min(1, (now - t0) / dur);
      step(ease(p));
      if(p < 1) requestAnimationFrame(frame); else res();
    })(performance.now());
  });
}
function statusAt(xp){
  const level = Math.floor(xp / XP_PER_LEVEL);

    }else if(i < curIdx){

function flashClass(el, cls, ms){

function fxLevelUp(newLevel, rankUp){

// Segmentweise von fromXP -> toXP, an jeder Levelgrenze Level-Up, Balken auf 0.
// Nur aufwärts: toXP >= fromXP ist durch die earnedXP-Monotonie garantiert.
async function animateStatus(fromXP, toXP){
  const panel = $("status-panel-el"); if(!panel) return;
  const XPL = XP_PER_LEVEL;
  if(toXP - fromXP < 1){
    lastShownXP = toXP; await putOne("settings", {key:"lastShownXP", value:toXP}); return;
  }
  const segs = [];
  let x = fromXP;
  while(true){
    const band = Math.floor(x / XPL);
    const nb = (band+1) * XPL;
    if(nb <= toXP){ segs.push({band, from:x, to:nb, levelup:true}); x = nb; if(x === toXP) break; }
    else { segs.push({band, from:x, to:toXP, levelup:false}); break; }
  }
  // Dauer: ~1000ms je volles Level, ~600ms Teilstück. >10 Level -> auf ~12s stauchen.
  const fullSegs = segs.filter(s=> s.levelup).length;
  const hasPartial = segs.some(s=> !s.levelup);
  const total = fullSegs*1000 + (hasPartial ? 600 : 0);
  const scale = fullSegs > 10 ? Math.min(1, 12000 / total) : 1;
  const totalSec = Math.max(0.2, total*scale / 1000);

  const startLevel = segs[0].band;
  updateRank(startLevel);
  setPanel(startLevel, (fromXP - startLevel*XPL) / XPL * 100, fromXP);

  // Swoosh läuft über die ganze Animation, Tonhöhe folgt der Füllgeschwindigkeit.
  const swoosh = startSwoosh(true);
  let lastG = 0, lastT = performance.now();
  try{
    for(const seg of segs){
      const dur = (seg.levelup ? 1000 : 600) * scale;
      const band = seg.band;
      await tween(dur, easeOutExpo, e=>{
        const cur = seg.from + (seg.to - seg.from) * e;
        setPanel(band, (cur - band*XPL) / XPL * 100, cur);
        if(swoosh){
          const now = performance.now();
          const gFrac = (cur - fromXP) / (toXP - fromXP);
          const dt = (now - lastT) / 1000;
          if(dt > 0.001){ swoosh.update(Math.abs(gFrac - lastG) / dt * totalSec); lastG = gFrac; lastT = now; }
        }
      });
      if(seg.levelup){
        const newLevel = band + 1;
        const rankUp = Math.floor(newLevel/10) > Math.floor(band/10);
        setPanel(newLevel, 0, newLevel*XPL);
        fxLevelUp(newLevel, rankUp);
      }
    }
  }finally{
    if(swoosh) swoosh.stop();
  }
  const fin = statusAt(toXP);
  setPanel(fin.level, fin.progress*100, toXP);
  updateRank(fin.level);
  lastShownXP = toXP;
  await putOne("settings", {key:"lastShownXP", value:toXP});
}

function buildReport(){
  const li = levelInfo(earnedXP);
  const levelBefore = Math.floor(snapshotEarnedXP / XP_PER_LEVEL);
  const list1 = [], list2 = [];
  sessionStart.forEach((meta, id)=>{
    const t = texById.get(id);
    if(!t || t.rating == null || isExcluded(t)) return;
    if(meta.prevRating == null) list1.push({name:t.name, score:t.rating});
    else list2.push({name:t.name, score:t.rating, prevScore:meta.prevRating, delta:t.rating - meta.prevRating});
  });
  list1.sort((a,b)=> b.score - a.score || a.name.localeCompare(b.name));
  list2.sort((a,b)=> b.delta - a.delta || a.name.localeCompare(b.name));
  const d = new Date(), p = n=> String(n).padStart(2,"0");
  return {
    ts: d.toISOString(),
    time: `${localDay(d)} ${p(d.getHours())}:${p(d.getMinutes())} Uhr`,
    gainedXP: earnedXP - snapshotEarnedXP,
    levelBefore, levelAfter: li.level,
    rankBefore: rankLabel(levelBefore), rankAfter: rankLabel(li.level),
    list1, list2
  };
}

      + (ch ? `<span class="rep-change">${ch}</span>` : "") + `</div>`
      + `<div class="rep-summary muted">Neu gemacht ${rep.list1.length} · Neu bearbeitet ${rep.list2.length}</div>`
      + `<span class="rep-toggle">▾</span>`;
    const body = document.createElement("div");
    body.className = "report-body"; body.hidden = true;
    body.innerHTML = listRowsHtml(rep);
    head.addEventListener("click", ()=>{
      body.hidden = !body.hidden;
      item.classList.toggle("open", !body.hidden);
    });
    item.append(head, body);
    root.appendChild(item);
  });
}
function renderFlowProgress(){
  const total = rateList.length;
  const rated = rateList.filter(t=> !isExcluded(t) && t.rating != null).length;
  $("rate-progress").textContent = `Bewertet ${rated} / ${total}`;
  const pop = dashPopulation();
  const decent = pop.filter(t=> effectiveRating(t) >= 50).length;
  const pct = pop.length ? decent/pop.length*100 : 0;
  $("flow-done-lab").textContent = `${decent} / ${pop.length} · ${pct.toFixed(1)} %`;
  $("flow-done-fill").style.width = pct.toFixed(1) + "%";
}
// "Nicht bewerten" aufheben: in Gruppe am Repräsentanten, sonst an der Textur.
async function liftExclude(t){
  const g = groupByMember.get(t.id);
  const target = g ? texById.get(g.repId) : t;
  if(!target) return;
  target.rateOverride = null;
  await putOne("textures", target);
  await persistGroups();
}
async function maybeFinish(){
  if(queueCount() > 0) return false;
  await finishSession();
  return true;
}
// "YYYY-MM-DD" -> lokales Date (Mitternacht)
function dayDate(key){
  const [y,m,d] = key.split("-").map(Number);
  return new Date(y, m-1, d);
}
function shiftDay(key, delta){
  const d = dayDate(key);
  return localDay(new Date(d.getFullYear(), d.getMonth(), d.getDate() + delta));
}
function startOfWeek(d){                          // Wochenstart Montag
  const x = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  x.setDate(x.getDate() - ((x.getDay() + 6) % 7));
  return x;
}
// Lückenlose Tagesreihe aus dem Event-Log: ein Eintrag pro Tag, vom ersten
// Event-Tag bis heute. Fundament für Verlauf-Graph und Prognose.
// Caveat: die Reihe reicht nur so weit zurück, wie ratingEvents existiert.
// cumXP ist die historische Summe aller positiven Deltas — sie kann vom
// aktuellen earnedXP abweichen (Bestwert-Logik zahlt nicht jede positive
// Bewegung aus, die Migration setzte eine eigene Baseline) und ist hier
// bewusst die Verlaufsgröße, nicht der Kontostand.
function buildDailySeries(events){
  const evs = events.slice().sort((a,b)=> a.ts < b.ts ? -1 : a.ts > b.ts ? 1 : 0);
  const byDay = new Map();                        // Tag -> Events des Tages (ts-Reihenfolge)
  evs.forEach(e=>{
    const d = e.date || (e.ts ? localDay(new Date(e.ts)) : null);
    if(!d) return;
    if(!byDay.has(d)) byDay.set(d, []);
    byDay.get(d).push(e);
  });
  const series = [];
  if(byDay.size === 0) return series;
  const ratings = new Map();                      // id -> fortgeschriebenes Rating
  let cumXP = 0;
  const today = localDay(new Date());
  let day = [...byDay.keys()].sort()[0];
  while(day <= today){
    let xpGained = 0, newCount = 0, reworkedCount = 0;
    (byDay.get(day) || []).forEach(e=>{
      if(e.delta > 0){ xpGained += e.delta; cumXP += e.delta; }
      if(e.old === 0) newCount++;                 // erstmals von 0 weg bewertet
      else if(e.old > 0) reworkedCount++;         // bereits bewertete verändert
      // new 0 = Rating entfernt -> Eintrag raus, damit rated/decent live bleiben
      if(e.new === 0) ratings.delete(e.id); else ratings.set(e.id, e.new);
    });
    let decent = 0;
    ratings.forEach(v=>{ if(v >= 50) decent++; });
    series.push({date:day, xpGained, newCount, reworkedCount, cumXP, decent, rated:ratings.size});
    day = shiftDay(day, 1);
  }
  return series;
}

/* ---------- Verlauf-Karte: Fenster, Aggregation, SVG von Hand ---------- */
const MONTH_NAMES = ["Januar","Februar","März","April","Mai","Juni",
                     "Juli","August","September","Oktober","November","Dezember"];
const MONTH_SHORT = ["Jan","Feb","Mär","Apr","Mai","Jun","Jul","Aug","Sep","Okt","Nov","Dez"];
const DAY_SHORT = ["So","Mo","Di","Mi","Do","Fr","Sa"];
const CHART_METRICS = [["cumxp","XP gesamt"],["xpday","XP pro Tag"],["textures","Texturen"]];
const CHART_RANGES = [["week","Woche"],["month","Monat"],["year","Jahr"]];

function weekLabel(startKey){
  const a = dayDate(startKey), b = dayDate(shiftDay(startKey, 6));
  return `${a.getDate()}.${a.getMonth()+1}.–${b.getDate()}.${b.getMonth()+1}.${b.getFullYear()}`;
}
function monthLabel(mk){ const [y,m] = mk.split("-").map(Number); return `${MONTH_NAMES[m-1]} ${y}`; }
// Tooltip-Beschriftung eines Slots (Tag oder Monat)
function slotLabel(kind, key){
  if(kind === "month") return monthLabel(key);
  const d = dayDate(key);
  return `${DAY_SHORT[d.getDay()]} ${d.getDate()}.${d.getMonth()+1}.${d.getFullYear()}`;
}

// Sichtbares Fenster aus chartRange + chartAnchor: Slot-Schlüssel (Tage bzw. Monate).
// week/month -> Tagesslots, year -> 12 Monatsslots (bewusst gröber).
function chartWindow(){
  const anchor = chartAnchor || localDay(new Date());
  if(chartRange === "week"){
    const start = localDay(startOfWeek(dayDate(anchor)));
    return {kind:"day", keys: Array.from({length:7}, (_,i)=> shiftDay(start, i)),
            period: start};
  }
  if(chartRange === "month"){
    const d = dayDate(anchor), y = d.getFullYear(), m = d.getMonth();
    const n = new Date(y, m+1, 0).getDate();
    return {kind:"day", keys: Array.from({length:n}, (_,i)=> localDay(new Date(y, m, i+1))),
            period: `${y}-${String(m+1).padStart(2,"0")}`};
  }
  const y = dayDate(anchor).getFullYear();
  return {kind:"month", keys: Array.from({length:12}, (_,i)=> `${y}-${String(i+1).padStart(2,"0")}`),
          period: String(y)};
}

// kumulierte XP am Ende von limitKey; "-99" als Tagesteil deckt Monatsenden ab
function cumAtEnd(series, limitKey){
  let cum = 0;
  for(const s of series){ if(s.date <= limitKey) cum = s.cumXP; else break; }
  return cum;
}
// Schlüsselgrenze des Zeitraums direkt vor dem Fenster (für Level-Marker-Anschluss)
function prevLimit(win){
  if(win.kind === "day") return shiftDay(win.keys[0], -1);
  const [y,m] = win.keys[0].split("-").map(Number);
  return (m === 1 ? `${y-1}-12` : `${y}-${String(m-1).padStart(2,"0")}`) + "-99";
}

// Slot-Werte fürs Fenster. Tag: direkter Serieneintrag (vor Serienbeginn 0,
// nach heute future). Monat: Summen je Monat, cumXP als Monatsendwert.
function chartPoints(series, win){
  const todayKey = localDay(new Date());
  if(win.kind === "day"){
    const byDate = new Map(series.map(s=>[s.date, s]));
    return win.keys.map(k=>{
      const e = byDate.get(k);
      return {key:k, future: k > todayKey,
        xpGained: e ? e.xpGained : 0, newCount: e ? e.newCount : 0,
        reworkedCount: e ? e.reworkedCount : 0, cumXP: e ? e.cumXP : cumAtEnd(series, k)};
    });
  }
  const agg = new Map();
  series.forEach(s=>{
    const mk = s.date.slice(0,7);
    let a = agg.get(mk); if(!a){ a = {xpGained:0, newCount:0, reworkedCount:0}; agg.set(mk, a); }
    a.xpGained += s.xpGained; a.newCount += s.newCount; a.reworkedCount += s.reworkedCount;
  });
  const curMonth = todayKey.slice(0,7);
  return win.keys.map(mk=>{
    const a = agg.get(mk) || {xpGained:0, newCount:0, reworkedCount:0};
    return {key:mk, future: mk > curMonth, xpGained:a.xpGained, newCount:a.newCount,
            reworkedCount:a.reworkedCount, cumXP: cumAtEnd(series, mk + "-99")};
  });
}

// Y-Achse: Schrittweite auf runden Wert (1/2/2.5/5 x 10^k), Maximum aufgerundet
function niceCeil(v){
  if(v <= 0) return 1;
  const p = Math.pow(10, Math.floor(Math.log10(v)));
  const f = v / p;
  return (f <= 1 ? 1 : f <= 2 ? 2 : f <= 2.5 ? 2.5 : f <= 5 ? 5 : 10) * p;
}
function axisScale(maxV){
  const step = Math.max(1, niceCeil(Math.max(1, maxV) / 4));   // ganzzahlig, sonst doppelte fmtNum-Labels
  return {step, max: Math.max(step, Math.ceil(maxV / step) * step)};
}

// SVG des Graphen für die aktuelle Metrik. Reine Theme-Farben bzw. Ableitungen
// vorhandener Töne (accent-Blau, #1D9E75 Teal, #EF9F27 Orange, #ffcc44 Gelb).
function chartSvg(series, pts, win){
  const W = 1000, H = 300, mL = 58, mR = 14, mT = 26, mB = 30;
  const pw = W - mL - mR, ph = H - mT - mB;
  const n = pts.length, slotW = pw / n;
  const x = i => mL + slotW * (i + 0.5);
  const maxV = chartMetric === "cumxp"
    ? Math.max(1, ...pts.map(p=>p.cumXP))
    : chartMetric === "textures"
      ? Math.max(1, ...pts.map(p=>Math.max(p.newCount, p.reworkedCount)))
      : Math.max(1, ...pts.map(p=>p.xpGained));
  const sc = axisScale(maxV);
  const y = v => mT + ph * (1 - v / sc.max);
  let out = "";

  // Gridlines + Y-Labels
  for(let v = 0; v <= sc.max; v += sc.step){
    const yy = y(v).toFixed(1);
    out += `<line x1="${mL}" y1="${yy}" x2="${W-mR}" y2="${yy}" stroke="var(--border)" stroke-width="1"${v === 0 ? "" : ' stroke-dasharray="3 4" opacity=".55"'}/>`
        + `<text x="${mL-8}" y="${Number(yy)+4}" text-anchor="end" font-size="11" fill="var(--muted)">${fmtNum(v)}</text>`;
  }

  // Heute-Slot dezent hinterlegen
  const todayKey = localDay(new Date());
  const nowKey = win.kind === "day" ? todayKey : todayKey.slice(0,7);
  const todaySlot = win.keys.indexOf(nowKey);
  if(todaySlot !== -1)
    out += `<rect x="${(mL + slotW*todaySlot).toFixed(1)}" y="${mT}" width="${slotW.toFixed(1)}" height="${ph}" fill="rgba(91,156,255,.06)"/>`;

  // X-Labels: Woche alle Tage, Monat jeder 5., Jahr alle Monate
  const xLabels = [];
  if(chartRange === "week")
    win.keys.forEach((k,i)=>{ const d = dayDate(k); xLabels.push([i, `${DAY_SHORT[d.getDay()]} ${d.getDate()}.${d.getMonth()+1}.`]); });
  else if(chartRange === "month")
    win.keys.forEach((k,i)=>{ if(i % 5 === 0) xLabels.push([i, `${i+1}.`]); });
  else
    win.keys.forEach((k,i)=> xLabels.push([i, MONTH_SHORT[i]]));
  xLabels.forEach(([i,lbl])=>{
    out += `<text x="${x(i).toFixed(1)}" y="${H-9}" text-anchor="middle" font-size="11" fill="var(--muted)">${lbl}</text>`;
  });

  if(chartMetric === "cumxp"){
    const drawn = pts.filter(p=> !p.future);
    if(drawn.length){
      const line = "M" + drawn.map((p,i)=> `${x(i).toFixed(1)},${y(p.cumXP).toFixed(1)}`).join(" L");
      const area = line + ` L${x(drawn.length-1).toFixed(1)},${y(0).toFixed(1)} L${x(0).toFixed(1)},${y(0).toFixed(1)} Z`;
      out += `<defs><linearGradient id="cumgrad" x1="0" y1="0" x2="0" y2="1">`
          + `<stop offset="0" stop-color="rgba(91,156,255,.30)"/>`
          + `<stop offset="1" stop-color="rgba(91,156,255,0)"/></linearGradient></defs>`
          + `<path d="${area}" fill="url(#cumgrad)"/>`
          + `<path d="${line}" fill="none" stroke="var(--accent)" stroke-width="2.2" stroke-linejoin="round"/>`;
      if(drawn.length <= 31)
        drawn.forEach((p,i)=> out += `<circle cx="${x(i).toFixed(1)}" cy="${y(p.cumXP).toFixed(1)}" r="2.4" fill="var(--accent)"/>`);
      // Level-Marker an jeder 700er-Schwelle, Rang-Marker (jede 10. Levelgrenze) kräftiger + Label
      let prevCum = cumAtEnd(series, prevLimit(win));
      drawn.forEach((p,i)=>{
        const fromL = Math.floor(prevCum / XP_PER_LEVEL), toL = Math.floor(p.cumXP / XP_PER_LEVEL);
        for(let L = fromL + 1; L <= toL; L++){
          const yy = y(L * XP_PER_LEVEL);
          if(L % 10 === 0){
            const ty = yy - 10 < mT + 10 ? yy + 18 : yy - 10;
            out += `<circle cx="${x(i).toFixed(1)}" cy="${yy.toFixed(1)}" r="5" fill="#ffcc44" stroke="#15171c" stroke-width="1.5"/>`
                + `<text x="${x(i).toFixed(1)}" y="${ty.toFixed(1)}" text-anchor="middle" font-size="11" font-weight="700" fill="#ffcc44">${rankLabel(L)}</text>`;
          }else{
            out += `<circle cx="${x(i).toFixed(1)}" cy="${yy.toFixed(1)}" r="3" fill="#15171c" stroke="var(--accent)" stroke-width="1.8"/>`;
          }
        }
        prevCum = p.cumXP;
      });
    }
  }else if(chartMetric === "xpday"){
    const bw = Math.min(26, slotW * 0.6);
    pts.forEach((p,i)=>{
      if(p.future || p.xpGained <= 0) return;
      const yy = y(p.xpGained);
      out += `<rect x="${(x(i)-bw/2).toFixed(1)}" y="${yy.toFixed(1)}" width="${bw.toFixed(1)}" height="${(y(0)-yy).toFixed(1)}" rx="2" fill="#1D9E75"/>`;
    });
  }else{
    // gruppierte Balken: links neu (accent), rechts überarbeitet (orange)
    const bw = Math.min(14, slotW * 0.28), gap = Math.min(3, slotW * 0.06);
    pts.forEach((p,i)=>{
      if(p.future) return;
      if(p.newCount > 0){
        const yy = y(p.newCount);
        out += `<rect x="${(x(i)-bw-gap/2).toFixed(1)}" y="${yy.toFixed(1)}" width="${bw.toFixed(1)}" height="${(y(0)-yy).toFixed(1)}" rx="2" fill="var(--accent)"/>`;
      }
      if(p.reworkedCount > 0){
        const yy = y(p.reworkedCount);
        out += `<rect x="${(x(i)+gap/2).toFixed(1)}" y="${yy.toFixed(1)}" width="${bw.toFixed(1)}" height="${(y(0)-yy).toFixed(1)}" rx="2" fill="#EF9F27"/>`;
      }
    });
  }

  // unsichtbare Hover-Spalten für den Tooltip
  pts.forEach((p,i)=>{
    out += `<rect class="ch-hot" data-i="${i}" x="${(mL + slotW*i).toFixed(1)}" y="${mT}" width="${slotW.toFixed(1)}" height="${ph}" fill="transparent"/>`;
  });
  return `<svg class="chart-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">${out}</svg>`;
}

// Zeiträume mit Aktivität (mind. ein Event am Tag) für die Direktauswahl, neueste zuerst.
function activePeriods(series){
  const set = new Set();
  series.forEach(s=>{
    if(s.xpGained === 0 && s.newCount === 0 && s.reworkedCount === 0) return;
    if(chartRange === "week") set.add(localDay(startOfWeek(dayDate(s.date))));
    else if(chartRange === "month") set.add(s.date.slice(0,7));
    else set.add(s.date.slice(0,4));
  });
  return [...set].sort().reverse();
}
function periodLabel(p){
  if(chartRange === "week") return weekLabel(p);
  if(chartRange === "month") return monthLabel(p);
  return p;
}
function periodStart(p){
  if(chartRange === "week") return p;
  if(chartRange === "month") return p + "-01";
  return p + "-01-01";
}
function shiftChartAnchor(dir){
  const a = dayDate(chartAnchor || localDay(new Date()));
  if(chartRange === "week") a.setDate(a.getDate() + dir*7);
  else if(chartRange === "month"){ a.setDate(1); a.setMonth(a.getMonth() + dir); }
  else { a.setMonth(0, 1); a.setFullYear(a.getFullYear() + dir); }
  chartAnchor = localDay(a);
}
function chartTipText(p, win){
  const lbl = slotLabel(win.kind, p.key);
  if(chartMetric === "cumxp"){
    const plus = p.xpGained > 0 ? ` · +${fmtNum(p.xpGained)}` : "";
    return `<b>${lbl}</b> · ${fmtNum(p.cumXP)} XP gesamt${plus}`;
  }
  if(chartMetric === "xpday") return `<b>${lbl}</b> · +${fmtNum(p.xpGained)} XP`;
  return `<b>${lbl}</b> · ${p.newCount} neu · ${p.reworkedCount} überarbeitet`;
}

// Verlauf-Karte komplett zeichnen (Controls, Navigation, SVG, Tooltip).
// Re-Render bei jeder Bedienung nur dieser Karte, nicht des ganzen Dashboards.
function renderChartCard(card, series){
  if(!card) return;
  const win = chartWindow();
  const pts = chartPoints(series, win);
  const todayKey = localDay(new Date());
  const nowKey = win.kind === "day" ? todayKey : todayKey.slice(0,7);
  const containsNow = win.keys[0] <= nowKey && nowKey <= win.keys[win.keys.length-1];
  const atOrPastNow = win.keys[win.keys.length-1] >= nowKey;

  const metricSeg = CHART_METRICS.map(([v,lbl])=>
    `<button class="segbtn${chartMetric === v ? " active" : ""}" data-metric="${v}">${lbl}</button>`).join("");
  const rangeSeg = CHART_RANGES.map(([v,lbl])=>
    `<button class="segbtn${chartRange === v ? " active" : ""}" data-range="${v}">${lbl}</button>`).join("");
  const periods = activePeriods(series);
  if(!periods.includes(win.period)) periods.unshift(win.period);
  const options = periods.map(p=>
    `<option value="${p}"${p === win.period ? " selected" : ""}>${periodLabel(p)}</option>`).join("");

  const bodyHtml = series.length
    ? chartSvg(series, pts, win)
    : `<div class="chart-empty">Noch keine Aktivität aufgezeichnet. Nach den ersten Bewertungen entsteht hier der Verlauf.</div>`;
  const legendHtml = chartMetric === "textures" && series.length
    ? `<div class="chart-legend"><span><i style="background:var(--accent)"></i>neu bewertet</span>`
      + `<span><i style="background:#EF9F27"></i>überarbeitet</span></div>`
    : "";

  card.innerHTML = `
    <div class="chart-head">
      <h3>Verlauf</h3>
      <div class="chart-controls">
        <div class="seg">${metricSeg}</div>
        <div class="seg">${rangeSeg}</div>
      </div>
    </div>
    <div class="chart-nav">
      <button data-nav="-1" title="Zeitraum zurück">‹</button>
      <select id="chart-period" title="Zeitraum wählen">${options}</select>
      <button data-nav="1" title="Zeitraum vor"${atOrPastNow ? " disabled" : ""}>›</button>
      <button id="chart-today"${containsNow ? " disabled" : ""}>Heute</button>
    </div>
    ${bodyHtml}${legendHtml}
    <div class="tl-tip" id="chart-tip"></div>`;

  card.querySelectorAll("[data-metric]").forEach(b=> b.addEventListener("click", async ()=>{
    chartMetric = b.dataset.metric;
    await putOne("settings", {key:"chartMetric", value:chartMetric});
    renderChartCard(card, series);
  }));
  card.querySelectorAll("[data-range]").forEach(b=> b.addEventListener("click", async ()=>{
    chartRange = b.dataset.range;
    await putOne("settings", {key:"chartRange", value:chartRange});
    renderChartCard(card, series);
  }));
  card.querySelectorAll("[data-nav]").forEach(b=> b.addEventListener("click", ()=>{
    shiftChartAnchor(Number(b.dataset.nav));
    renderChartCard(card, series);
  }));
  $("chart-today").addEventListener("click", ()=>{ chartAnchor = null; renderChartCard(card, series); });
  $("chart-period").addEventListener("change", e=>{
    chartAnchor = periodStart(e.target.value);
    renderChartCard(card, series);
  });

  const tip = $("chart-tip");
  card.querySelectorAll(".ch-hot").forEach(r=>{
    r.addEventListener("mouseenter", ()=>{
      const p = pts[Number(r.dataset.i)];
      if(!p || p.future){ tip.style.display = "none"; return; }
      tip.innerHTML = chartTipText(p, win);
      tip.style.display = "block";
    });
    r.addEventListener("mousemove", e=>{
      tip.style.left = (e.clientX + 14) + "px";
      tip.style.top  = (e.clientY + 14) + "px";
    });
    r.addEventListener("mouseleave", ()=>{ tip.style.display = "none"; });
  });
}

/* ---------- Prognose: Ziel Level 100 ---------- */
// Eigenes Panel im Dashboard. Fehlende XP bis 100*XP_PER_LEVEL, Tempo aus der
// Tagesreihe (dailyTempo), geschätzte Tage + Zieldatum. Sonderfälle: Ziel
// erreicht bzw. noch kein Tempo.
function forecastPanelHtml(series){
  const GOAL = 100 * XP_PER_LEVEL;
  const missing = Math.max(0, GOAL - earnedXP);
  const pct = Math.min(100, earnedXP / GOAL * 100);
  const barHtml = `
    <div class="fp-bar-lab">
      <span>${fmtNum(Math.min(earnedXP, GOAL))} / ${fmtNum(GOAL)} XP</span>
      <span>${pct.toFixed(1)} %</span>
    </div>
    <div class="fp-track"><div class="fp-fill" style="width:${pct.toFixed(1)}%"></div></div>`;
  let mainHtml;
  if(missing === 0){
    mainHtml = `
      <div class="fp-main">Level 100 erreicht</div>
      <div class="fp-sub">Das Langzeitziel ist geschafft. Alles Weitere ist Bonus.</div>`;
  }else{
    const tempo = dailyTempo(series);
    if(tempo <= 0){
      mainHtml = `
        <div class="fp-main fp-dim">Noch keine Schätzung</div>
        <div class="fp-sub">Nach ein paar aktiven Tagen mit XP erscheint hier ein Zieldatum.</div>
        <div class="fp-stats">
          <div><b>${fmtNum(missing)}</b><span>XP fehlen</span></div>
        </div>`;
    }else{
      const tage = Math.ceil(missing / tempo);
      const ziel = new Date(); ziel.setDate(ziel.getDate() + tage);
      mainHtml = `
        <div class="fp-main">Level 100 in ~${fmtNum(tage)} Tagen</div>
        <div class="fp-sub">voraussichtlich am ${localDay(ziel)} bei gleichbleibendem Tempo</div>
        <div class="fp-stats">
          <div><b>${fmtNum(missing)}</b><span>XP fehlen</span></div>
          <div><b>~${fmtNum(tempo)}</b><span>XP pro aktivem Tag</span></div>
          <div><b>${fmtNum(tage)}</b><span>Tage geschätzt</span></div>
        </div>`;
    }
  }
  return `<div class="forecast-panel">
      <div class="fp-tag">Prognose · Level 100</div>
      ${mainHtml}${barHtml}
    </div>`;
}
// Aktive Tage: jeder lokale Tag mit mindestens einem ratingEvents-Eintrag.
function activeDaySet(events){
  const s = new Set();
  events.forEach(e=>{
    const d = e.date || (e.ts ? localDay(new Date(e.ts)) : null);
    if(d) s.add(d);
  });
  return s;
}
// Streak-Basis: ein aktiver Tag für die Streak ist jeder Tag mit Login ODER
// mindestens einer Wertung — Vereinigung aus loginDays und den Event-Tagen.
function streakDaySet(events){
  return new Set([...activeDaySet(events), ...loginDays]);
}
// aktuelle Streak: aufeinanderfolgende aktive Tage rückwärts ab heute.
// Heute noch ohne Aktivität -> ab gestern zählen (kein Bruch).
function currentStreak(days){
  let key = localDay(new Date());
  if(!days.has(key)) key = shiftDay(key, -1);
  let n = 0;
  while(days.has(key)){ n++; key = shiftDay(key, -1); }
  return n;
}
function bestStreak(days){
  let best = 0;
  for(const k of days){
    if(days.has(shiftDay(k, -1))) continue;       // nur Lauf-Anfänge
    let len = 0, cur = k;
    while(days.has(cur)){ len++; cur = shiftDay(cur, 1); }
    best = Math.max(best, len);
  }
  return best;
}
/* ---------- Tägliches Streak-Popup ---------- */
// Erscheint genau einmal pro Tag, ausgelöst von der ersten echten Wertung des
// Tages (Trigger am Ende von applyRating). Exclude-Toggles laufen nicht über
// applyRating und lösen es darum nie aus.
const STREAK_MESSAGES = [
  "Dranbleiben zahlt sich aus.",
  "Jeden Tag ein Stück näher am Ziel.",
  "Die Kette hält. Weiter so.",
  "Konstanz schlägt Talent.",
  "Wieder ein Schritt Richtung Level 100.",
];
async function maybeShowStreakPopup(){
  const today = localDay(new Date());
  if(streakPopupShownDay === today) return;
  streakPopupShownDay = today;
  await putOne("settings", {key:"streakPopupShownDay", value:today});
  const evRec = await getOne("settings", "ratingEvents");
  const days = streakDaySet(evRec ? evRec.value : []);
  showStreakPopup(currentStreak(days), bestStreak(days));
}
function showStreakPopup(cur, best){
  const old = $("streak-popup"); if(old) old.remove();
  const el = document.createElement("div");
  el.id = "streak-popup";
  el.innerHTML = `
    <div class="streak-modal">
      <div class="stp-tag">Tages-Streak</div>
      <div class="stp-big">${ICON_FLAME} ${cur}</div>
      <div class="stp-sub">Tage am Stück</div>
      <div class="stp-best">${ICON_MEDAL} Beste Streak: ${best}</div>
      <div class="stp-msg">${escapeHtml(STREAK_MESSAGES[cur % STREAK_MESSAGES.length])}</div>
      <div class="stp-btn"><button class="primary" id="stp-close">Weiter</button></div>
    </div>`;
  const close = ()=>{
    document.removeEventListener("keydown", onKey, true);
    el.classList.remove("show");
    setTimeout(()=> el.remove(), 260);
    // Bewerten-Flow nicht stören: Fokus zurück ins Eingabefeld des Raters
    if(!$("rater").hidden){ $("rate-value").focus(); $("rate-value").select(); }
  };
  // Capture-Phase: Esc schließt nur das Popup, erreicht nie den Rater-Handler
  const onKey = e=>{
    if(e.key === "Escape"){ e.preventDefault(); e.stopPropagation(); close(); }
  };
  el.addEventListener("click", e=>{ if(e.target === el) close(); });
  el.querySelector("#stp-close").addEventListener("click", close);
  document.addEventListener("keydown", onKey, true);
  document.body.appendChild(el);
  requestAnimationFrame(()=> el.classList.add("show"));
}

// Tempo: mittlere XP je aktivem Tag (xpGained > 0) über die letzten 14 aktiven
// Tage der Tagesreihe (buildDailySeries).
function dailyTempo(series){
  const active = series.filter(s=> s.xpGained > 0).slice(-14);
  if(active.length === 0) return 0;
  return active.reduce((s,e)=> s + e.xpGained, 0) / active.length;
}

let lastBadgeCount = 0;
// Gelbe Zahl unten rechts am Bewerten-Button = offene (ungewertete) Texturen der Population.
function renderRateBadge(){
  let badge = $("rate-badge");
  if(!badge){
    badge = document.createElement("span"); badge.id = "rate-badge";
    $("rate-start").appendChild(badge);
  }
  const n = allTextures.filter(t=> effectiveRatable(t) && t.rating == null).length;
  $("rate-start").disabled = n <= 0;          // gesperrt, solange nichts offen
  if(n <= 0){ badge.hidden = true; lastBadgeCount = 0; return; }
  const grew = badge.hidden || n > lastBadgeCount;
  badge.textContent = n;
  badge.hidden = false;
  if(grew){                                        // Einblenden bzw. Puls bei Erscheinen/Anstieg
    badge.classList.remove("pulse");
    void badge.offsetWidth;
    badge.classList.add("pulse");
  }
  lastBadgeCount = n;
}

// Komplettes Dashboard. XP/Level/Rang aus dem monotonen earnedXP, alle übrigen
// Werte live aus DB + Population berechnet (kein Caching).
async function renderDashboard(){
  const root = $("dashboard");
  if(allTextures.length === 0){
    root.innerHTML = '<p class="dash-empty">Noch keine Daten — ZIP laden.</p>';
    return;

  const evRec = await getOne("settings", "ratingEvents");
  const events = evRec ? evRec.value : [];

  const pop    = dashPopulation();
  const li     = levelInfo(earnedXP);
  const rated  = pop.filter(t=> t.rating != null);
  const decent = pop.filter(t=> effectiveRating(t) >= 50);
  const queue  = pop.filter(t=> effectiveRating(t) < 50);
  const best   = pop.reduce((m,t)=> Math.max(m, effectiveRating(t)), 0);
  const avgScore = rated.length ? rated.reduce((s,t)=> s + t.rating, 0) / rated.length : 0;

  const statusHtml = statusHeroHtml(li);
  const statsHtml = `
    <div class="sp-stats">
      <div class="sp-stat"><b>${rated.length ? avgScore.toFixed(1) : "–"}</b><span>Ø Score</span></div>

      <div class="sp-stat"><b>${pop.length}</b><span>Ziel gesamt</span></div>
    </div>`;

  const donePct = pop.length ? decent.length / pop.length * 100 : 0;
  const doneHtml = `
    <div class="dash-done">
      <div class="lab"><span>Durchgespielt</span><span>${decent.length} / ${pop.length} · ${donePct.toFixed(1)} %</span></div>
      <div class="dash-done-track"><div class="dash-done-fill" style="width:${donePct.toFixed(1)}%"></div></div>
      <div class="hint">100 % durchgespielt = jede Textur der Population auf 50+.</div>
    </div>`;

  // Streak: aktive Tage = Login ODER mindestens eine Wertung (streakDaySet)
  const days = streakDaySet(events);
  const streakHtml = `
    <div class="dash-card">
      <h3>Streak</h3>
      <div class="streak-flames">
        <div><div class="big"><span class="sf-flame">${ICON_FLAME}</span> ${currentStreak(days)}</div><div class="sub">aktuelle Streak (Tage)</div></div>
        <div><div class="big"><span class="sf-medal">${ICON_MEDAL}</span> ${bestStreak(days)}</div><div class="sub">beste Streak</div></div>
      </div>
      <div class="hint">Schon das Öffnen des Tools zählt den Tag für die Streak.</div>
    </div>`;

  // Diese Woche: distinkte bearbeitete Texturen + gewonnene XP (positive Deltas)
  const wkKey = localDay(startOfWeek(new Date()));
  let wkPts = 0; const wkIds = new Set();
  events.forEach(e=>{
    const d = e.date || (e.ts ? localDay(new Date(e.ts)) : null);
    if(!d || d < wkKey) return;
    if(e.delta > 0) wkPts += e.delta;
    if(e.id != null) wkIds.add(e.id);
  });
  const weekHtml = `
    <div class="dash-card">
      <h3>Diese Woche</h3>
      <div class="streak-flames">
        <div><div class="big">${wkIds.size}</div><div class="sub">bearbeitete Texturen</div></div>
        <div><div class="big">+${fmtNum(wkPts)}</div><div class="sub">XP (positive Deltas)</div></div>
      </div>
    </div>`;

  // Coverage: volle Sicht inkl. Vanilla-Default (Block + Item, nur Repräsentanten)
  const covBase  = allTextures.filter(t=>
    (t.category === "block" || t.category === "item") &&
    !isGroupedNonRep(t) && !isExcluded(t));
  const covPop   = covBase.filter(t=> !t.isDefault);
  const cov50    = covPop.filter(t=> effectiveRating(t) >= 50).length;
  const covUnder = covPop.length - cov50;
  const coverageHtml = `
    <div class="dash-card wide">
      <h3>Abdeckung</h3>
      <div class="cov-grid">
        <div class="cov-cell"><b>${covBase.length}</b><span>Gesamt</span></div>
        <div class="cov-cell"><b>${covPop.length}</b><span>Bearbeitet</span></div>
        <div class="cov-cell"><b>${cov50}</b><span>auf 50+</span></div>
        <div class="cov-cell"><b>${covUnder}</b><span>unter 50</span></div>
      </div>
      <div class="hint">Volle Sicht inkl. Vanilla-Default — anders als „Durchgespielt".</div>
    </div>`;

  // Tagesreihe aus dem Event-Log: Fundament für Verlauf-Karte + Prognose
  const series = buildDailySeries(events);
  const chartShell = `<div class="dash-card wide" id="verlauf-card"></div>`;
  const forecastHtml = forecastPanelHtml(series);

  root.innerHTML = exportReminderHtml() + statusHtml + statsHtml + doneHtml +
    `<div class="dash-cards">${chartShell}${forecastHtml}${streakHtml}${weekHtml}${coverageHtml}</div>`;
  wireExportReminder(root);
  renderChartCard($("verlauf-card"), series);

  // Erfolge prüfen (Population + Events liegen vor). Neu erfüllte -> Toast + Persistenz.
  checkAchievements(await achievementCtx(pop, events));

  // XP-Animation, sobald Dashboard sichtbar wird: lastShownXP -> totalXP, genau einmal.
  if(pendingAnim && !statusAnimating){
    pendingAnim = false; statusAnimating = true;
    const fromXP = lastShownXP, toXP = li.totalXP;
    animateStatus(fromXP, toXP).finally(()=>{ statusAnimating = false; });
  }
}

// Kontext für die Bedingungen aus Population + Event-Log; lädt die Session-
// Anzahl (reports) selbst nach -> async, Aufrufer awaiten.
async function achievementCtx(pop, events){
  const decentCount = pop.filter(t=> effectiveRating(t) >= 50).length;
  const ratedCount  = pop.filter(t=> t.rating != null).length;
  const count60 = pop.filter(t=> effectiveRating(t) >= 60).length;
  const count70 = pop.filter(t=> effectiveRating(t) >= 70).length;
  const count80 = pop.filter(t=> effectiveRating(t) >= 80).length;
  const count90 = pop.filter(t=> effectiveRating(t) >= 90).length;
  const popLen = pop.length;
  const repRec = await getOne("settings", "reports");
  return {
    decentCount, ratedCount, popLen, count60, count70, count80, count90,
    donePct: popLen ? decentCount / popLen * 100 : 0,
    level: levelInfo(earnedXP).level,
    streak: currentStreak(streakDaySet(events)),
    sessionCount: repRec ? repRec.value.length : 0,
  };
}
// Neu erfüllte Erfolge freischalten, persistieren, Toast je neuem Erfolg.
async function checkAchievements(ctx){
  const newly = [];
  for(const a of ACHIEVEMENTS){
    if(achievementsUnlocked.has(a.id)) continue;
    let ok = false; try{ ok = a.cond(ctx); }catch{ ok = false; }
    if(ok){ achievementsUnlocked.add(a.id); newly.push(a); }
  }
  if(newly.length){
    await putOne("settings", {key:"achievements", value:[...achievementsUnlocked]});
    newly.forEach(showAchievement);
  }
  return newly;
}
// Toast-Warteschlange: ein Erfolg nach dem anderen, je mit Ton.
let achQueue = [], achShowing = false;
function showAchievement(a){
  achQueue.push(a);
  if(!achShowing) nextAchievement();
}
function nextAchievement(){
  const a = achQueue.shift();
  if(!a){ achShowing = false; return; }
  achShowing = true;
  soundAchievement();
  const el = document.createElement("div");
  el.className = "ach-toast";
  el.innerHTML = `<span class="ach-ico">${ICON_TROPHY}</span>`
    + `<div class="ach-txt"><div class="ach-h">Erfolg freigeschaltet</div>`
    + `<div class="ach-n">${escapeHtml(a.name)}</div>`
    + `<div class="ach-d">${escapeHtml(a.desc)}</div></div>`;
  document.body.appendChild(el);
  requestAnimationFrame(()=> el.classList.add("show"));
  setTimeout(()=>{
    el.classList.remove("show");
    setTimeout(()=>{ el.remove(); nextAchievement(); }, 320);
  }, 3200);
}
function soundAchievement(){
  if(!ensureAudio()) return;
  [784, 988, 1175].forEach((f,i)=> synthTone(f, i*0.07, 0.22, "triangle", 0.14));
}
// Erfolge-Seite (#view-achievements): Kopf mit Gesamtfortschritt, darunter die
// Erfolge als Karten in Kategorie-Sektionen (cat, Registry-Reihenfolge);
// offene zeigen den Fortschritt zum Ziel (prog).
async function renderAchievements(){
  const root = $("achievements");
  const evRec = await getOne("settings", "ratingEvents");
  const events = evRec ? evRec.value : [];
  const ctx = await achievementCtx(dashPopulation(), events);
  const unlocked = ACHIEVEMENTS.filter(a=> achievementsUnlocked.has(a.id)).length;
  const pct = ACHIEVEMENTS.length ? unlocked / ACHIEVEMENTS.length * 100 : 0;
  const cardHtml = a=>{
    const on = achievementsUnlocked.has(a.id);
    let stateHtml = "";
    if(on){
      stateHtml = `<div class="achv-state">Freigeschaltet</div>`;
    }else if(a.prog){
      const p = a.prog(ctx);
      const cur = Math.max(0, Math.min(p.cur, p.goal));
      const ppct = p.goal > 0 ? cur / p.goal * 100 : 0;
      stateHtml = `<div class="achv-prog">
          <div class="achv-track"><div class="achv-fill" style="width:${ppct.toFixed(0)}%"></div></div>
          <span class="achv-num">${fmtNum(cur)} / ${fmtNum(p.goal)}</span>
        </div>`;
    }
    return `<div class="achv-card${on ? " on" : ""}">
        <span class="achv-ico">${ICON_TROPHY}</span>
        <div class="achv-body">
          <div class="achv-n">${escapeHtml(a.name)}</div>
          <div class="achv-d">${escapeHtml(a.desc)}</div>
          ${stateHtml}
        </div>
      </div>`;
  };
  // aufeinanderfolgende Karten gleicher Kategorie zu Sektionen bündeln
  const blocks = [];
  ACHIEVEMENTS.forEach(a=>{
    const last = blocks[blocks.length - 1];
    if(!last || last.cat !== a.cat) blocks.push({cat:a.cat, items:[a]});
    else last.items.push(a);
  });
  const secs = blocks.map(b=>{
    const got = b.items.filter(a=> achievementsUnlocked.has(a.id)).length;
    return `<div class="achv-sec"><h3>${escapeHtml(b.cat)}</h3>`
      + `<span class="cnt">${got} / ${b.items.length}</span></div>`
      + `<div class="achv-grid">${b.items.map(cardHtml).join("")}</div>`;
  }).join("");
  root.innerHTML = `
    <div class="achv-head">
      <div>
        <div class="achv-title">Erfolge</div>
        <div class="achv-sub">${unlocked} von ${ACHIEVEMENTS.length} freigeschaltet</div>
      </div>
      <div class="achv-head-bar"><div style="width:${pct.toFixed(0)}%"></div></div>
    </div>
    ${secs}`;
}

// Zustand aus DB laden und alles zeichnen
async function refresh(){
  allTextures = await getAll("textures");
  // Migration (Erstlauf): bestRating nachtragen — der aktuelle Wert gilt als bisheriger
  // Höchststand, damit nichts rückwirkend nachzahlt. earnedXP bleibt unberührt.
  const noBest = allTextures.filter(t=> t.bestRating === undefined);
  if(noBest.length){
    noBest.forEach(t=> t.bestRating = t.rating != null ? t.rating : null);
    await putAll("textures", noBest);
  }
  const setting = await getOne("settings", "selectedCategories");
  selectedCats = new Set(setting ? setting.value : ["block","item"]);
  const bl = await getOne("settings", "baseline");
  baseline = bl ? bl.value : {};
  const hd = await getOne("settings", "hideDefault");
  hideDefault = hd ? hd.value : true;
  const gs = await getOne("settings", "groups");
  groups = gs ? gs.value : [];
  const sm = await getOne("settings", "sortMode");
  sortMode = sm ? sm.value : "low";
  const fo = await getOne("settings", "foldersOpen");
  foldersOpen = fo ? fo.value : false;
  const cm = await getOne("settings", "chartMetric");
  chartMetric = cm && CHART_METRICS.some(([v])=> v === cm.value) ? cm.value : "cumxp";
  const cr = await getOne("settings", "chartRange");
  chartRange = cr && CHART_RANGES.some(([v])=> v === cr.value) ? cr.value : "week";
  const ac = await getOne("settings", "achievements");
  achievementsUnlocked = new Set(ac ? ac.value : []);
  const le = await getOne("settings", "lastExportAt");
  lastExportAt = le ? le.value : null;
  const rs = await getOne("settings", "ratingsSinceExport");
  ratingsSinceExport = rs ? rs.value : 0;
  const bd = await getOne("settings", "backupDirHandle");
  backupDirHandle = bd ? bd.value : null;
  const ld = await getOne("settings", "loginDays");
  loginDays = ld ? ld.value : [];
  const spd = await getOne("settings", "streakPopupShownDay");
  streakPopupShownDay = spd ? spd.value : null;
  // Login registrieren: schon das Öffnen des Tools zählt den Tag für die Streak
  const todayKey = localDay(new Date());
  if(!loginDays.includes(todayKey)){
    loginDays.push(todayKey);
    await putOne("settings", {key:"loginDays", value:loginDays});
  }
  const vw = await getOne("settings", "view");
  const curView = vw ? vw.value : "rate";
  applyView(curView);
  texById = new Map(allTextures.map(t=>[t.id, t]));
  normalizeGroups();
  buildMemberMap();
  const earned = await getOne("settings", "earnedXP");
  if(earned){ earnedXP = earned.value; }
  else {
    // Migration (Erstlauf): Startwert = heutiger Live-Stand, also Score-Summe der
    // Population plus 20 je bewertetem Nicht-Repräsentanten -> kein sichtbarer Sprung.
    let bonus = 0;
    for(const g of groups){
      for(const id of g.memberIds){
        if(id === g.repId) continue;
        const t = texById.get(id);
        if(t && !t.isDefault && t.rating != null) bonus += 20;
      }
    }
    earnedXP = dashPopulation().reduce((s,t)=> s + effectiveRating(t), 0) + bonus;
    await putOne("settings", {key:"earnedXP", value:earnedXP});
  }
  const ls = await getOne("settings", "lastShownXP");
  if(ls){ lastShownXP = ls.value; }
  else {                                   // Erstwert verankern -> keine Riesen-Animation
    lastShownXP = earnedXP;
    await putOne("settings", {key:"lastShownXP", value:lastShownXP});
  }
  renderCategories(categoriesOf(allTextures), selectedCats);
  renderFilters();
  renderAll();
  if(curView === "reports") renderReports();
  else if(curView === "achievements") renderAchievements();
  else if(curView === "dashboard"){ pendingAnim = true; renderDashboard(); }
}

/* ---------- Auto-Backup: File System Access API (nur Chromium) ---------- */
// Ordner wählen: DirectoryHandle ist in Chromium IndexedDB-serialisierbar und
// überlebt so den Reload. Ohne API bleibt der Eintrag deaktiviert (Wiring unten).
async function pickBackupDir(){
  if(!window.showDirectoryPicker){
    setStatus("Backup-Ordner braucht die File System Access API (Chromium). Der manuelle Export bleibt nutzbar.");
    return;
  }
  $("data-menu").open = false;
  try{
    const handle = await window.showDirectoryPicker({mode:"readwrite"});
    backupDirHandle = handle;
    await putOne("settings", {key:"backupDirHandle", value:handle});
    setStatus(`Backup-Ordner gewählt: ${handle.name}. Automatisches Speichern ist an.`);
  }catch(err){
    if(err.name === "AbortError") return;          // Nutzer hat den Dialog abgebrochen
    console.error(err);
    setStatus("Backup-Ordner: " + err.message);
  }
}
async function clearBackupDir(){
  $("data-menu").open = false;
  backupDirHandle = null;
  await putOne("settings", {key:"backupDirHandle", value:null});
  setStatus("Backup-Ordner gelöst. Automatisches Speichern ist aus.");
}

// Datei in den Backup-Ordner schreiben. false = Aufrufer fällt auf den
// Download-Pfad zurück (kein Handle, Permission verweigert, Schreibfehler).
// Wirft nie: Permission kann jederzeit entzogen sein, requestPermission braucht
// eine Nutzergeste und kann im Timer-Kontext scheitern -> alles try/catch.
async function writeFileToBackupDir(filename, blob){
  if(!backupDirHandle) return false;
  try{
    let perm = await backupDirHandle.queryPermission({mode:"readwrite"});
    if(perm !== "granted") perm = await backupDirHandle.requestPermission({mode:"readwrite"});
    if(perm !== "granted"){
      setStatus("Backup-Ordner: Schreibrecht nicht erteilt — automatisches Speichern pausiert.");
      return false;
    }
    const fh = await backupDirHandle.getFileHandle(filename, {create:true});
    const w = await fh.createWritable();
    await w.write(blob);
    await w.close();
    return true;
  }catch(err){
    console.error(err);
    setStatus("Backup-Ordner: Schreiben fehlgeschlagen (" + err.message + ").");
    return false;
  }
}
// Nur die jüngsten `keep` Dateien mit dem Präfix behalten (Namen tragen den
// Zeitstempel -> absteigend sortiert = neueste zuerst). Nur für die vollen
// Snapshots gedacht; Fehler werden toleriert (Datei evtl. gerade gesperrt).
async function pruneBackupDir(prefix, keep){
  if(!backupDirHandle) return;
  try{
    const names = [];
    for await (const entry of backupDirHandle.values()){
      if(entry.kind === "file" && entry.name.startsWith(prefix)) names.push(entry.name);
    }
    names.sort((a,b)=> b.localeCompare(a));
    for(const name of names.slice(keep)){
      try{ await backupDirHandle.removeEntry(name); }catch(err){ console.error(err); }
    }
  }catch(err){ console.error(err); }
}

// Schlankes Backup: wie exportBackup, aber ohne Bilder (dataUrl/prevDataUrl
// ausgelassen, nicht geleert) und ohne backupDirHandle (nicht portabel).
// Nur auf demselben Rechner/Browser selbst-wiederherstellend — die Bilder
// liegen dort in IndexedDB. Für Umzug/Totalverlust dient der volle Snapshot.
async function buildLeanBackup(){
  const textures = (await getAll("textures")).map(t=>{
    const {dataUrl, prevDataUrl, ...rest} = t;
    return rest;
  });
  const settings = {};
  (await getAll("settings")).forEach(s=>{
    if(s.key !== "backupDirHandle") settings[s.key] = s.value;
  });
  return {app:"mc-texture-rater", kind:"lean", version:1,
          exportedAt:new Date().toISOString(), textures, settings};
}
// Autosave ist lautlos optional: ohne gewählten Ordner passiert nichts
// (kein Download, kein Fehler). Fester Dateiname -> immer überschreiben.
async function autosaveLean(){
  if(!backupDirHandle) return;
  try{
    const data = await buildLeanBackup();
    const blob = new Blob([JSON.stringify(data)], {type:"application/json"});
    if(await writeFileToBackupDir("autosave.json", blob)){
      showAutosaveIndicator();
      await putOne("settings", {key:"lastAutosaveAt", value:new Date().toISOString()});
    }
  }catch(err){ console.error(err); }
}
// Entprellung: schnelles Bewerten -> genau ein Schreibvorgang ~3 s nach der letzten Aktion.
function scheduleAutosave(){
  clearTimeout(autosaveTimer);
  autosaveTimer = setTimeout(autosaveLean, 3000);
}
// Indikator unten rechts: ~2 s sichtbar, dann sanft ausblenden (Opacity-Transition
// wie .ach-toast). Mehrfachaufrufe resetten nur den Timer, nichts stapelt.
function showAutosaveIndicator(){
  const el = $("autosave-ind"); if(!el) return;
  const d = new Date(), p = n=> String(n).padStart(2,"0");
  $("autosave-ind-text").textContent = `Gespeichert ${p(d.getHours())}:${p(d.getMinutes())}`;
  el.classList.add("show");
  clearTimeout(autosaveIndTimer);
  autosaveIndTimer = setTimeout(()=> el.classList.remove("show"), 2000);
}
// Voller Snapshot MIT Bildern, nur am Session-Ende (teuer, mehrere MB). Still in
// den Ordner, danach auf die letzten 20 prunen. Zählt als vollwertiges Backup
// -> Erinnerungs-Zähler zurücksetzen. Fehler blockieren den Abschluss nie.
async function writeFullBackupToDir(){
  if(!backupDirHandle) return;
  try{
    const textures = await getAll("textures");
    const settings = {};
    (await getAll("settings")).forEach(s=>{
      if(s.key !== "backupDirHandle") settings[s.key] = s.value;
    });
    const data = {app:"mc-texture-rater", kind:"full", version:1,
                  exportedAt:new Date().toISOString(), textures, settings};
    const blob = new Blob([JSON.stringify(data)], {type:"application/json"});
    const d = new Date(), p = n=> String(n).padStart(2,"0");
    const fn = `texturepack-full-${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`
      + `_${p(d.getHours())}-${p(d.getMinutes())}-${p(d.getSeconds())}.json`;
    if(await writeFileToBackupDir(fn, blob)){
      await pruneBackupDir("texturepack-full-", 20);
      lastExportAt = new Date().toISOString();
      ratingsSinceExport = 0;
      await putOne("settings", {key:"lastExportAt", value:lastExportAt});
      await putOne("settings", {key:"ratingsSinceExport", value:0});
    }
  }catch(err){
    console.error(err);
    setStatus("Auto-Backup fehlgeschlagen: " + err.message);
  }
}

/* ---------- Backup: Erinnerung ---------- */
// Fällig, wenn seit dem letzten Export zu viele Bewertungen liefen oder es zu lange her ist.
// Aktiver Backup-Ordner = Autosave läuft -> gilt als gesichert, nie fällig.
function exportReminderDue(){
  if(backupDirHandle) return false;
  if(ratingsSinceExport > EXPORT_REMINDER_AFTER) return true;
  if(lastExportAt){
    const days = (Date.now() - new Date(lastExportAt).getTime()) / 86400000;
    if(days > 14) return true;
  }
  return false;
}
// Nicht blockierender Hinweis mit direktem Export-Trigger (kein automatischer Download).
function exportReminderHtml(){
  if(!exportReminderDue()) return "";
  return `<div class="export-reminder">`
    + `<span>Lange kein Backup. Dein Stand liegt nur im Browser und geht beim Leeren des Speichers verloren.</span>`
    + `<button class="export-reminder-btn">Backup exportieren</button></div>`;
}
function wireExportReminder(root){
  const btn = root.querySelector(".export-reminder-btn");
  if(btn) btn.addEventListener("click", exportBackup);
}

/* ---------- Backup: Export / Import ---------- */
// Alles aus beiden Stores einsammeln und als JSON herunterladen.
async function exportBackup(){
  try{
    const textures = await getAll("textures");
    const settingsArr = await getAll("settings");
    const settings = {};
    settingsArr.forEach(s=> settings[s.key] = s.value);   // {key,value} -> {key:value}
    const data = {
      app: "mc-texture-rater", version: 1,
      exportedAt: new Date().toISOString(),
      textures, settings
    };
    const blob = new Blob([JSON.stringify(data)], {type:"application/json"});
    const d = new Date();
    const fn = `texturepack-ratings-${d.getFullYear()}-`
      + `${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`
      + `_${String(d.getHours()).padStart(2,"0")}-${String(d.getMinutes()).padStart(2,"0")}`
      + `-${String(d.getSeconds()).padStart(2,"0")}.json`;
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = fn;
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(a.href);
    lastExportAt = new Date().toISOString();              // Erinnerung zurücksetzen
    ratingsSinceExport = 0;
    await putOne("settings", {key:"lastExportAt", value:lastExportAt});
    await putOne("settings", {key:"ratingsSinceExport", value:0});
    setStatus(`Backup exportiert: ${textures.length} Texturen, ${settingsArr.length} Einstellungen.`);
  }catch(err){
    console.error(err);
    setStatus("Export-Fehler: " + err.message);
  }
}

// JSON-Backup einlesen und prüfen. kind "full" (oder fehlend = Altdatei):
// Stores nach Bestätigung komplett ersetzen, inkl. Bilder. kind "lean": nur den
// Wertungszustand per id auf die vorhandenen Texturen mappen — Bilder fehlen in
// der Datei und bleiben die lokalen.
async function importBackup(file){
  try{
    const text = await file.text();
    let data;
    try{ data = JSON.parse(text); }
    catch{ setStatus("Import-Fehler: Datei ist kein gültiges JSON."); return; }
    // Identität prüfen, sonst nichts schreiben
    if(!data || data.app !== "mc-texture-rater" || data.version !== 1){
      setStatus("Import-Fehler: Keine passende Backup-Datei (app/version stimmt nicht).");
      return;
    }
    if(!Array.isArray(data.textures) || typeof data.settings !== "object" || data.settings === null){
      setStatus("Import-Fehler: Backup unvollständig (textures/settings fehlen).");
      return;
    }
    // backupDirHandle gehört nie in eine portable Datei (und wäre als leeres
    // Objekt kaputt) -> aus den Datei-Settings immer ausfiltern.
    const settingsRecords = Object.entries(data.settings)
      .filter(([key])=> key !== "backupDirHandle")
      .map(([key,value])=>({key,value}));

    if(data.kind === "lean"){
      if(!confirm(
        `Schlankes Autosave importieren?\n`
        + `Wertungen, Gruppen und Einstellungen aus der Datei ersetzen den aktuellen Stand. `
        + `Die Datei enthält keine Bilder — sie bleiben die lokal vorhandenen. Nicht umkehrbar.`)) return;
      const existing = await getAll("textures");
      const exMap = new Map(existing.map(t=>[t.id, t]));
      const toPut = [];
      let skipped = 0;
      for(const src of data.textures){
        const t = exMap.get(src.id);
        if(!t){ skipped++; continue; }     // Bild nie geladen -> erst ZIP/volles Backup
        t.rating       = src.rating       !== undefined ? src.rating       : null;
        t.bestRating   = src.bestRating   !== undefined ? src.bestRating   : t.bestRating;
        t.rateOverride = src.rateOverride !== undefined ? src.rateOverride : null;
        t.flag         = src.flag         !== undefined ? src.flag         : null;
        t.prevRating   = src.prevRating   !== undefined ? src.prevRating   : null;
        toPut.push(t);
      }
      if(toPut.length) await putAll("textures", toPut);
      if(settingsRecords.length) await putAll("settings", settingsRecords);
      await refresh();
      setStatus(`Lean-Backup importiert: ${toPut.length} Texturen aktualisiert`
        + (skipped ? `, ${skipped} übersprungen (lokal kein Bild — erst ZIP oder volles Backup laden)` : "")
        + ".");
      return;
    }

    if(!confirm(
      `Aktuellen Stand vollständig ersetzen?\n`
      + `${data.textures.length} Texturen und ${settingsRecords.length} `
      + `Einstellungen aus dem Backup werden geschrieben. Nicht umkehrbar.`)) return;
    // leeren, dann zurückschreiben; den lokalen Backup-Ordner über den Import retten
    await clearDB();
    if(backupDirHandle) await putOne("settings", {key:"backupDirHandle", value:backupDirHandle});
    if(data.textures.length) await putAll("textures", data.textures);
    if(settingsRecords.length) await putAll("settings", settingsRecords);
    // Ansicht komplett neu aus DB aufbauen -> Wertungen + Ø stimmen wieder
    await refresh();
    setStatus(`Backup importiert: ${data.textures.length} Texturen, ${settingsRecords.length} Einstellungen.`);
  }catch(err){
    console.error(err);
    setStatus("Import-Fehler: " + err.message);
  }
}
