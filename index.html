// verbucht (und persistiert) werden, bislang ungenutzt.
const ACHIEVEMENTS = [
  {id:"first_rating",  name:"Erster Pinselstrich", desc:"Erste Textur bewertet.",       xp:0, cond:c=> c.ratedCount >= 1},
  {id:"ten_decent",    name:"Warmgelaufen",        desc:"10 Texturen auf 50+.",          xp:0, cond:c=> c.decentCount >= 10},
  {id:"hundred_decent",name:"Hundertschaft",       desc:"100 Texturen auf 50+.",         xp:0, cond:c=> c.decentCount >= 100},
  {id:"level_10",      name:"Aufgestiegen",        desc:"Level 10 erreicht.",            xp:0, cond:c=> c.level >= 10},
  {id:"streak_7",      name:"Eine Woche dran",     desc:"7 Tage Streak.",                xp:0, cond:c=> c.streak >= 7},
  {id:"halfway",       name:"Halbzeit",            desc:"50 % durchgespielt.",           xp:0, cond:c=> c.donePct >= 50},
  {id:"complete",      name:"Durchgespielt",       desc:"Population komplett auf 50+.",  xp:0, cond:c=> c.popLen > 0 && c.decentCount === c.popLen},
];
// Kontext für die Bedingungen aus Population + Event-Log.
function achievementCtx(pop, events){
  const decentCount = pop.filter(t=> effectiveRating(t) >= 50).length;
  const ratedCount  = pop.filter(t=> t.rating != null).length;
  const popLen = pop.length;
  return {
    decentCount, ratedCount, popLen,
    donePct: popLen ? decentCount / popLen * 100 : 0,
    level: levelInfo(earnedXP).level,
    streak: currentStreak(activeDaySet(events)),
  };
}
// Neu erfüllte Erfolge freischalten, persistieren, Toast je neuem Erfolg.
async function checkAchievements(ctx){
  const newly = [];
  for(const a of ACHIEVEMENTS){
    if(achievementsUnlocked.has(a.id)) continue;
    let ok = false; try{ ok = a.cond(ctx); }catch{ ok = false; }
    if(ok){ achievementsUnlocked.add(a.id); newly.push(a); }
  }
  if(newly.length){
    await putOne("settings", {key:"achievements", value:[...achievementsUnlocked]});
    newly.forEach(showAchievement);
  }
  return newly;
}
// Toast-Warteschlange: ein Erfolg nach dem anderen, je mit Ton.
let achQueue = [], achShowing = false;
function showAchievement(a){
  achQueue.push(a);
  if(!achShowing) nextAchievement();
}
function nextAchievement(){
  const a = achQueue.shift();
  if(!a){ achShowing = false; return; }
  achShowing = true;
  soundAchievement();
  const el = document.createElement("div");
  el.className = "ach-toast";
  el.innerHTML = `<span class="ach-ico">${ICON_TROPHY}</span>`
    + `<div class="ach-txt"><div class="ach-h">Erfolg freigeschaltet</div>`
    + `<div class="ach-n">${escapeHtml(a.name)}</div>`
    + `<div class="ach-d">${escapeHtml(a.desc)}</div></div>`;
  document.body.appendChild(el);
  requestAnimationFrame(()=> el.classList.add("show"));
  setTimeout(()=>{
    el.classList.remove("show");
    setTimeout(()=>{ el.remove(); nextAchievement(); }, 320);
  }, 3200);
}
function soundAchievement(){
  if(!ensureAudio()) return;
  [784, 988, 1175].forEach((f,i)=> synthTone(f, i*0.07, 0.22, "triangle", 0.14));
}
// Dashboard-Karte: alle Erfolge, freigeschaltete hervorgehoben.
function achievementsCardHtml(){
  const cells = ACHIEVEMENTS.map(a=>{
    const on = achievementsUnlocked.has(a.id);
    return `<div class="ach-cell${on ? " on" : ""}" title="${escapeHtml(a.desc)}">`
      + `<span class="ach-cell-ico">${ICON_TROPHY}</span>`
      + `<div class="ach-cell-n">${escapeHtml(a.name)}</div>`
      + `<div class="ach-cell-d">${escapeHtml(a.desc)}</div></div>`;
  }).join("");
  const unlocked = ACHIEVEMENTS.filter(a=> achievementsUnlocked.has(a.id)).length;
  return `<div class="dash-card wide">
      <h3>Erfolge <span class="muted">(${unlocked}/${ACHIEVEMENTS.length})</span></h3>
      <div class="ach-grid">${cells}</div>
    </div>`;
}

// Auswahl geändert -> persistieren, Filter + Übersicht neu
async function onCategoryToggle(){
  const checked = [...document.querySelectorAll("#categories input:checked")].map(c=>c.value);
  await putOne("settings", {key:"selectedCategories", value:checked});
  selectedCats = new Set(checked);
  binFilter = null;
  renderFilters();

}

// Zustand aus DB laden und alles zeichnen
async function refresh(){
  allTextures = await getAll("textures");
  const setting = await getOne("settings", "selectedCategories");
  selectedCats = new Set(setting ? setting.value : ["block","item"]);
  const bl = await getOne("settings", "baseline");
  baseline = bl ? bl.value : {};
  const hd = await getOne("settings", "hideDefault");
  hideDefault = hd ? hd.value : true;
  const gs = await getOne("settings", "groups");
  groups = gs ? gs.value : [];
  const sm = await getOne("settings", "sortMode");
  sortMode = sm ? sm.value : "low";
  const fo = await getOne("settings", "foldersOpen");
  foldersOpen = fo ? fo.value : false;
  const ac = await getOne("settings", "achievements");
  achievementsUnlocked = new Set(ac ? ac.value : []);
  const le = await getOne("settings", "lastExportAt");
  lastExportAt = le ? le.value : null;
  const rs = await getOne("settings", "ratingsSinceExport");
  ratingsSinceExport = rs ? rs.value : 0;
  const vw = await getOne("settings", "view");
  const curView = vw ? vw.value : "rate";
  applyView(curView);
  texById = new Map(allTextures.map(t=>[t.id, t]));
  normalizeGroups();
  buildMemberMap();
  const earned = await getOne("settings", "earnedXP");
  if(earned){ earnedXP = earned.value; }
  else {
    // Migration (Erstlauf): Startwert = heutiger Live-Stand, also Score-Summe der
    // Population plus 20 je bewertetem Nicht-Repräsentanten -> kein sichtbarer Sprung.
    let bonus = 0;
    for(const g of groups){
      for(const id of g.memberIds){
        if(id === g.repId) continue;
        const t = texById.get(id);
        if(t && !t.isDefault && t.rating != null) bonus += 20;
      }
    }
    earnedXP = dashPopulation().reduce((s,t)=> s + effectiveRating(t), 0) + bonus;
    await putOne("settings", {key:"earnedXP", value:earnedXP});
  }
  const ls = await getOne("settings", "lastShownXP");
  if(ls){ lastShownXP = ls.value; }
  else {                                   // Erstwert verankern -> keine Riesen-Animation
    lastShownXP = earnedXP;
    await putOne("settings", {key:"lastShownXP", value:lastShownXP});
  }
  renderCategories(categoriesOf(allTextures), selectedCats);
  renderFilters();
  renderAll();
  if(curView === "reports") renderReports();
  else if(curView === "dashboard"){ pendingAnim = true; renderDashboard(); }
}

/* ---------- Backup: Erinnerung ---------- */
// Fällig, wenn seit dem letzten Export zu viele Bewertungen liefen oder es zu lange her ist.
function exportReminderDue(){
  if(ratingsSinceExport > EXPORT_REMINDER_AFTER) return true;
  if(lastExportAt){
    const days = (Date.now() - new Date(lastExportAt).getTime()) / 86400000;
    if(days > 14) return true;
  }
  return false;
}
// Nicht blockierender Hinweis mit direktem Export-Trigger (kein automatischer Download).
function exportReminderHtml(){
  if(!exportReminderDue()) return "";
  return `<div class="export-reminder">`
    + `<span>Lange kein Backup. Dein Stand liegt nur im Browser und geht beim Leeren des Speichers verloren.</span>`
    + `<button class="export-reminder-btn">Backup exportieren</button></div>`;
}
function wireExportReminder(root){
  const btn = root.querySelector(".export-reminder-btn");
  if(btn) btn.addEventListener("click", exportBackup);
}

/* ---------- Backup: Export / Import ---------- */
// Alles aus beiden Stores einsammeln und als JSON herunterladen.
async function exportBackup(){
  try{
    const textures = await getAll("textures");
    const settingsArr = await getAll("settings");
    const settings = {};
    settingsArr.forEach(s=> settings[s.key] = s.value);   // {key,value} -> {key:value}
    const data = {
      app: "mc-texture-rater", version: 1,
      exportedAt: new Date().toISOString(),
      textures, settings
    };
    const blob = new Blob([JSON.stringify(data)], {type:"application/json"});
    const d = new Date();
    const fn = `texturepack-ratings-${d.getFullYear()}-`
      + `${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`
      + `_${String(d.getHours()).padStart(2,"0")}-${String(d.getMinutes()).padStart(2,"0")}`
      + `-${String(d.getSeconds()).padStart(2,"0")}.json`;
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = fn;
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(a.href);
    lastExportAt = new Date().toISOString();              // Erinnerung zurücksetzen
    ratingsSinceExport = 0;
    await putOne("settings", {key:"lastExportAt", value:lastExportAt});
    await putOne("settings", {key:"ratingsSinceExport", value:0});
    setStatus(`Backup exportiert: ${textures.length} Texturen, ${settingsArr.length} Einstellungen.`);
  }catch(err){
    console.error(err);
    setStatus("Export-Fehler: " + err.message);
  }
}

// JSON-Backup einlesen, prüfen, nach Bestätigung Stores komplett ersetzen.
async function importBackup(file){
  try{
    const text = await file.text();
    let data;
    try{ data = JSON.parse(text); }
    catch{ setStatus("Import-Fehler: Datei ist kein gültiges JSON."); return; }
    // Identität prüfen, sonst nichts schreiben
    if(!data || data.app !== "mc-texture-rater" || data.version !== 1){
      setStatus("Import-Fehler: Keine passende Backup-Datei (app/version stimmt nicht).");
      return;
    }
    if(!Array.isArray(data.textures) || typeof data.settings !== "object" || data.settings === null){
      setStatus("Import-Fehler: Backup unvollständig (textures/settings fehlen).");
      return;
    }
    if(!confirm(
      `Aktuellen Stand vollständig ersetzen?\n`
      + `${data.textures.length} Texturen und ${Object.keys(data.settings).length} `
      + `Einstellungen aus dem Backup werden geschrieben. Nicht umkehrbar.`)) return;
    // leeren, dann zurückschreiben
    await clearDB();
    if(data.textures.length) await putAll("textures", data.textures);
    const settingsRecords = Object.entries(data.settings).map(([key,value])=>({key,value}));
    if(settingsRecords.length) await putAll("settings", settingsRecords);
    // Ansicht komplett neu aus DB aufbauen -> Wertungen + Ø stimmen wieder
    await refresh();
    setStatus(`Backup importiert: ${data.textures.length} Texturen, ${settingsRecords.length} Einstellungen.`);
  }catch(err){
    console.error(err);
    setStatus("Import-Fehler: " + err.message);
  }
}

/* ---------- Ansichts-Umschalter (Bewerten / Dashboard) ---------- */
function applyView(view){
  const v = (view === "dashboard" || view === "reports") ? view : "rate";
  $("view-rate").hidden = v !== "rate";
  $("view-dashboard").hidden = v !== "dashboard";
  $("view-reports").hidden = v !== "reports";
  $("view-finish").hidden = true;                         // Abschluss ist transient
  document.querySelectorAll("#view-switch .segbtn")
    .forEach(b=> b.classList.toggle("active", b.dataset.view === v));
}
async function setView(view){
  ensureAudio();                                          // Geste -> Audio bereit
  pendingReport = null;                                   // Abschluss-Screen verlassen
  applyView(view);
  if(view === "dashboard"){ pendingAnim = true; renderDashboard(); }   // live neu rechnen + Animation
  else if(view === "reports") renderReports();
  await putOne("settings", {key:"view", value:view});     // persistieren
}
document.querySelectorAll("#view-switch .segbtn")
  .forEach(b=> b.addEventListener("click", ()=> setView(b.dataset.view)));

// Panel-Automatik (zentraler Hook): offenes Gruppen-Verwaltungs-Panel schließt bei
// jeder anderen Interaktion — Status, Sortierung, Kategorien, Standard-Schalter,
// Gruppieren, Bewerten starten, Ansichtswechsel, Klick in die Rating-Verteilung.
document.addEventListener("click", e=>{
  if(!groupPanelOpen) return;
  if(e.target.closest("#grouppanel")) return;     // Klicks im Panel selbst nicht
  if(e.target.closest("#grp-open-btn")) return;    // eigener Toggle regelt sich selbst
  groupPanelOpen = false;
  renderGroupPanel();
}, true);

// Drag & Drop: Vollflächen-Overlay über das ganze Fenster. dragenter/dragleave-Zähler
// fängt Flackern bei verschachtelten Elementen ab. Drop läuft über den handleZip-Pfad.
const dzOverlay = $("dropzone-overlay");
let dragDepth = 0;
const dragHasFiles = e => e.dataTransfer && [...e.dataTransfer.types].includes("Files");
window.addEventListener("dragenter", e=>{
  if(!dragHasFiles(e)) return;
  e.preventDefault();
  dragDepth++; dzOverlay.hidden = false;
});
window.addEventListener("dragover", e=>{ e.preventDefault(); });
window.addEventListener("dragleave", e=>{
  e.preventDefault();
  if(--dragDepth <= 0){ dragDepth = 0; dzOverlay.hidden = true; }
});
window.addEventListener("drop", e=>{
  e.preventDefault();
  dragDepth = 0; dzOverlay.hidden = true;
  const files = e.dataTransfer ? [...e.dataTransfer.files] : [];
  const f = files.find(f=>/\.zip$/i.test(f.name));
  if(f) handleZip(f); else if(files.length) setStatus("Keine ZIP-Datei erkannt.");
});

/* ---------- Phase 2: Bewerten ---------- */
let rateList = [], rateIdx = 0;   // aktuelle Liste + Position
let snapshotEarnedXP = 0, sessionStart = new Map(), pendingReport = null;
let pendingAnim = false, statusAnimating = false, lastShownXP = 0, audioCtx = null;

// Session starten. Menge = Population (effectiveRatable) mit Rating null zum Start.
// onlyFlagged=true -> zusätzlich nur neue & geänderte. earnedXP-Stand + prevRating festhalten.
async function startRating(onlyFlagged=false){
  ensureAudio();
  rateList = allTextures
    .filter(t=> effectiveRatable(t) && t.rating == null
      && (!onlyFlagged || t.flag === "new" || t.flag === "changed"))
    .sort((a,b)=> a.category.localeCompare(b.category) || a.name.localeCompare(b.name));
  if(rateList.length === 0){
    setStatus(onlyFlagged ? "Nichts Neues/Geändertes." : "Nichts offen."); return;
  }
  // earnedXP ist monoton -> Session-Delta = earnedXP minus Startstand, nie negativ.
  snapshotEarnedXP = earnedXP;
  sessionStart = new Map();
  rateList.forEach(t=> sessionStart.set(t.id, { prevRating: t.prevRating != null ? t.prevRating : null }));
  rateIdx = 0;
  $("rater").hidden = false;
  document.body.style.overflow = "hidden";
  renderRate();
}

function renderRate(){
  const stage = $("rate-stage"), sum = $("rate-summary");
  sum.hidden = true; stage.hidden = false;
  if(rateList.length === 0){ exitRating(); return; }
  rateIdx = Math.min(rateList.length - 1, Math.max(0, rateIdx));
  const t = rateList[rateIdx];
  $("rate-meta").innerHTML = `${t.name} <span class="c">· ${t.category}</span>`;
  if(t.prevDataUrl){                          // geändert: alt vs neu nebeneinander
    $("rate-img").hidden = true;
    $("rate-compare").hidden = false;
    $("rate-img-old").src = t.prevDataUrl; $("rate-img-old").alt = t.name + " (alt)";
    $("rate-img-new").src = t.dataUrl;      $("rate-img-new").alt = t.name + " (neu)";
    $("rate-old-rating").textContent = t.prevRating == null ? "ungewertet" : "★ " + t.prevRating;
  }else{
    $("rate-compare").hidden = true;
    $("rate-img").hidden = false;
    $("rate-img").src = t.dataUrl;
    $("rate-img").alt = t.name;
  }
  $("rate-value").value  = t.rating == null ? "" : t.rating;
  $("rate-slider").value = t.rating == null ? 50 : t.rating;
  // Exclude-Status spiegeln: Button-Text + Markierung am Bild
  const excluded = isExcluded(t);
  const exBtn = $("rate-exclude");
  exBtn.textContent = excluded ? "Doch bewerten (X)" : "Nicht bewerten (X)";
  exBtn.classList.toggle("active", excluded);
  $("rate-stage").classList.toggle("excluded", excluded);
  $("rate-value").focus(); $("rate-value").select();
  renderFlowProgress();
}

// aktuellen Wert speichern (sofort in DB) + zur nächsten offenen springen.
// Queue auf 0 -> Abschluss. Neubewertung einer ausgeschlossenen Textur hebt Ausschluss auf.
async function commitRate(){
  const t = rateList[rateIdx]; if(!t) return;
  const raw = $("rate-value").value.trim();
  if(raw !== ""){
    let n = Math.min(100, Math.max(1, Math.round(Number(raw))));
    if(Number.isFinite(n)){
      if(isExcluded(t)) await liftExclude(t);
      await applyRating(t, n);               // Event + sofort persistieren
    }
  }
  if(await maybeFinish()) return;            // Queue leer -> Session-Abschluss
  let next = rateList.findIndex((x,i)=> i > rateIdx && x.rating == null && !isExcluded(x));
  if(next === -1) next = rateList.findIndex(x=> x.rating == null && !isExcluded(x));
  if(next !== -1) rateIdx = next;
  renderRate();
}

// "nicht bewerten" togglen. Textur bleibt im Interface (zurückblättern +
// erneut X = aufheben, dann doch bewerten). In Gruppe: ganze Gruppe mitziehen.
// Rating bleibt erhalten (eingefroren), Position unverändert.
async function excludeCurrent(){
  const t = rateList[rateIdx];
  if(!t) return;
  const g = groupByMember.get(t.id);
  const target = g ? texById.get(g.repId) : t;   // in Gruppe wirkt es am Rep
  if(!target) return;
  const newOverride = target.rateOverride === "exclude" ? null : "exclude";
  target.rateOverride = newOverride;
  await putOne("textures", target);
  await persistGroups();
  if(newOverride === "exclude"){         // ausschließen -> sofort zur nächsten
    if(await maybeFinish()) return;
    rateIdx = Math.min(rateList.length - 1, rateIdx + 1);
  }
  renderRate();                          // sonst gleiche Stelle, Status sichtbar
}

// blättern durch die Session-Menge (auch zu bereits bewerteten)
function navRate(delta){
  rateIdx = Math.min(rateList.length - 1, Math.max(0, rateIdx + delta));
  renderRate();
}

function exitRating(){
  $("rater").hidden = true;
  document.body.style.overflow = "";
  refresh();   // Übersicht mit aktuellen Wertungen neu laden
}

// Eingabefeld: nur Ziffern, Slider spiegeln
$("rate-value").addEventListener("input", ()=>{
  const v = $("rate-value"); v.value = v.value.replace(/[^0-9]/g, "");
  const n = Number(v.value);
  if(n >= 1 && n <= 100) $("rate-slider").value = n;
});
// Slider als Backup: spiegelt in Eingabefeld
$("rate-slider").addEventListener("input", ()=>{ $("rate-value").value = $("rate-slider").value; });

// Tastatursteuerung (nur wenn Bewertung offen)
document.addEventListener("keydown", e=>{
  if($("rater").hidden) return;
  if(e.key === "Escape"){ exitRating(); return; }
  if(e.key === "Enter"){ e.preventDefault(); commitRate(); }
  else if(e.key === "x" || e.key === "X"){ e.preventDefault(); excludeCurrent(); }
  else if(e.key === "ArrowRight"){ e.preventDefault(); navRate(1); }
  else if(e.key === "ArrowLeft"){  e.preventDefault(); navRate(-1); }
});

$("rate-start").addEventListener("click", ()=>startRating(false));
$("rate-exit").addEventListener("click", exitRating);
$("rate-exclude").addEventListener("click", excludeCurrent);

/* ---------- Start ---------- */
openDB().then(d=>{ db = d; return refresh(); })
        .catch(err=>setStatus("DB-Fehler: " + err.message));
</script>
